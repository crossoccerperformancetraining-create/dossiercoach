        const { useState, useEffect, useRef, useMemo } = React;

        // --- NOVO HOOK DE DADOS: LOCAL + CLOUD (FIREBASE) ---
        const useFirebaseStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });

            useEffect(() => {
                const user = firebase.auth().currentUser;
                if (user) {
                    db.collection('users').doc(user.uid).collection('data').doc(key)
                      .get().then(doc => {
                          if (doc.exists) {
                              try {
                                  const parsed = JSON.parse(doc.data().value);
                                  setStoredValue(parsed);
                                  window.localStorage.setItem(key, doc.data().value);
                              } catch(e) { console.error("Erro no JSON da nuvem", e); }
                          }
                      }).catch(err => console.log("Erro ao buscar da nuvem:", err));
                }
            }, [key]);

            useEffect(() => {
                const strVal = JSON.stringify(storedValue);
                window.localStorage.setItem(key, strVal);
                
                const user = firebase.auth().currentUser;
                if (user) {
                    db.collection('users').doc(user.uid).collection('data').doc(key)
                      .set({ 
                          value: strVal, 
                          updated_at: firebase.firestore.FieldValue.serverTimestamp() 
                      }, { merge: true }).catch(err => console.log("Salvo localmente.", err));
                }
            }, [key, storedValue]);

            return [storedValue, setStoredValue];
        };

                shirt: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.38 3.4a1.6 1.6 0 0 0-1.6-1.6H5.22a1.6 1.6 0 0 0-1.6 1.6l-1.6 6.3a1.6 1.6 0 0 0 1.2 1.9l2.78.6v9.1a1.6 1.6 0 0 0 1.6 1.6h8.8a1.6 1.6 0 0 0 1.6-1.6v-9.1l2.78-.6a1.6 1.6 0 0 0 1.2-1.9l-1.6-6.3z"/></svg>,
                pdf: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
                sun: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
                moon: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            };
            return <span className={className}>{icons[name] || null}</span>;
        };

        const StarRating = ({ value, onChange, readOnly=false }) => (
            <div className="flex gap-1">{[1, 2, 3, 4, 5].map((star) => <button key={star} onClick={() => !readOnly && onChange(star)} className={`star-rating ${star <= value ? 'active' : ''}`} disabled={readOnly}><Icon name="star" size={14} /></button>)}</div>

        // --- COMPONENTE DE REDE (ONLINE/OFFLINE) ---
        const NetworkStatus = () => {
            const [isOnline, setIsOnline] = useState(navigator.onLine);

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            return (
                <div className={`w-full text-center text-[10px] font-bold text-white py-1 z-50 transition-colors shadow-md no-print ${isOnline ? 'bg-green-500' : 'bg-red-500'}`}>

                </div>

        };

        // --- TELA DE LOGIN (COM FIREBASE) ---
        const LoginScreen = ({ themeColor }) => {

                    await firebase.auth().signInWithEmailAndPassword(email, pass);

                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm z-10 relative">
                        <div className="flex justify-center mb-6">
                            <div className="w-20 h-20 rounded-full flex items-center justify-center text-white shadow-lg" style={{backgroundColor: themeColor}}>
                                <Icon name="shield" size={40} />
                            </div>
                        </div>

        };

        // --- COMPONENTES AUXILIARES ---
        const OscillationChart = ({ sessions, color }) => {
            if(!sessions || sessions.length < 2) return <div className="h-32 flex items-center justify-center text-xs text-slate-400">Dados insuficientes.</div>;
            const h = 100, w = 250, pad = 20; const pts = sessions.slice(-10).map((s, i, arr) => { const x = pad + (i / (arr.length - 1)) * (w - 2*pad); const y = h - pad - ((s.rating / 5) * (h - 2*pad)); return `${x},${y}`; }).join(' ');
            return (<svg viewBox={`0 0 ${w} ${h}`} className="w-full h-32 bg-slate-50 rounded border border-slate-100"><polyline points={pts} fill="none" stroke={color} strokeWidth="2" />{sessions.slice(-10).map((s, i, arr) => { const x = pad + (i / (arr.length - 1)) * (w - 2*pad); const y = h - pad - ((s.rating / 5) * (h - 2*pad)); return <circle key={i} cx={x} cy={y} r="3" fill={color} />; })}</svg>);

        const PositionalBarChart = ({ players, color }) => {
            if(!players || players.length === 0) return null;

                <div className="flex items-end justify-around h-32 gap-2 border-b border-slate-200 p-2">

        const VerticalPitch = ({ size }) => {
            return ( <div className="w-full h-32 rounded border border-slate-300 relative overflow-hidden flex items-center justify-center grass-pattern shadow-inner group"><svg className="absolute inset-0 w-full h-full p-2 opacity-80" viewBox="0 0 100 140" fill="none" stroke="white" strokeWidth="1.5"><rect x="5" y="5" width="90" height="130" /><line x1="5" y1="70" x2="95" y2="70" /><circle cx="50" cy="70" r="12" /><rect x="25" y="5" width="50" height="20" /><rect x="38" y="5" width="24" height="8" /><path d="M 40 25 Q 50 32 60 25" strokeLinecap="round" /><path d="M 5 10 Q 10 5 10 5" /><path d="M 90 5 Q 90 10 95 10" /><rect x="25" y="115" width="50" height="20" /><rect x="38" y="127" width="24" height="8" /><path d="M 40 115 Q 50 108 60 115" strokeLinecap="round" /><path d="M 5 130 Q 10 135 10 135" /><path d="M 95 130 Q 90 135 90 135" /></svg>{size === 'Pequeno' && <div className="absolute inset-0 flex items-center justify-center"><div className="w-[40%] h-[30%] bg-yellow-400/50 border-2 border-yellow-300 rounded shadow-[0_0_20px_rgba(250,204,21,0.6)] animate-pulse z-10 mix-blend-overlay"></div></div>}{size === 'Médio' && <div className="absolute inset-0 flex items-center justify-center"><div className="w-[90%] h-[50%] bg-yellow-400/40 border-2 border-yellow-300 shadow-[0_0_20px_rgba(250,204,21,0.5)] animate-pulse z-10 mix-blend-overlay"></div></div>}{size === 'Grande' && <div className="absolute inset-0 bg-yellow-400/30 border-4 border-yellow-300 animate-pulse z-10 mix-blend-overlay"></div>}{!size && <div className="absolute inset-0 bg-black/20 flex items-center justify-center z-20"><span className="text-[9px] text-white font-bold bg-black/50 px-2 rounded backdrop-blur-sm">DEFINIR ESPAÇO</span></div>}</div> );
        };

        const RadarChart = ({ data, size = 120, color = "#3b82f6" }) => {
            const scale = size / 2.5; const center = size / 2; 
            const safeData = data || { r:0, g:0, p:0, a:0 };
            const values = [safeData.r, safeData.g, safeData.p, safeData.a]; 
            const points = values.map((val, i) => { const angle = (Math.PI / 2) * i - Math.PI / 2; return [center + Math.cos(angle) * (val * scale), center + Math.sin(angle) * (val * scale)]; });
            const pointsStr = points.map(p => p.join(',')).join(' ');
            return (<div className="relative flex items-center justify-center"><svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="overflow-visible"><circle cx={center} cy={center} r={scale} fill="none" stroke="#e2e8f0" strokeWidth="1" strokeDasharray="2,2"/><line x1={center} y1={center - scale} x2={center} y2={center + scale} stroke="#cbd5e1" strokeWidth="1" /><line x1={center - scale} y1={center} x2={center + scale} y2={center} stroke="#cbd5e1" strokeWidth="1" /><polygon points={pointsStr} fill={color} fillOpacity="0.3" stroke={color} strokeWidth="2" /><text x={center} y={center - scale - 10} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#64748b">NOTA</text><text x={center + scale + 10} y={center + 3} textAnchor="start" fontSize="9" fontWeight="bold" fill="#64748b">GOLS</text><text x={center} y={center + scale + 12} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#64748b">PRES</text><text x={center - scale - 10} y={center + 3} textAnchor="end" fontSize="9" fontWeight="bold" fill="#64748b">AST</text></svg></div>);
        };

        // --- MODAL DE CONFIGURAÇÕES (COM MODO ESCURO E LOGOUT) ---
        const SettingsModal = ({ show, onClose, themeColor, setThemeColor, teamLogo, setTeamLogo, teamName, setTeamName, isDarkMode, setIsDarkMode }) => {
            if (!show) return null;
            
            const handleExport = () => { 
                const data = {}; 
                for (let i = 0; i < localStorage.length; i++) { 
                    const key = localStorage.key(i); 
                    if (key.startsWith('pc_')) { data[key] = localStorage.getItem(key); } 
                } 
                const blob = new Blob([JSON.stringify(data)], {type: 'application/json'}); 
                const url = URL.createObjectURL(blob); 
                const a = document.createElement('a'); 
                a.href = url; 
                a.download = `procoach_backup_${new Date().toISOString().slice(0,10)}.json`; 
                document.body.appendChild(a); 
                a.click(); 
                document.body.removeChild(a); 
                URL.revokeObjectURL(url); 
            };

            const handleImport = (event) => { 
                const file = event.target.files[0]; 
                if (!file) return; 
                const reader = new FileReader(); 
                reader.onload = (e) => { 
                    try { 
                        const data = JSON.parse(e.target.result); 
                        Object.keys(data).forEach(key => localStorage.setItem(key, data[key])); 
                        alert("Backup restaurado com sucesso! O sistema será recarregado."); 
                        window.location.reload(); 
                    } catch (error) { alert("Erro ao ler arquivo de backup."); } 
                }; 
                reader.readAsText(file); 
            };

            // CORREÇÃO: Função de Logout agora recarrega a página automaticamente
            const handleLogout = () => {
                if(window.confirm("Tem certeza que deseja sair do sistema?")) {
                    firebase.auth().signOut().then(() => {
                        window.location.reload();
                    });
                }
            };

            return ( 
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm no-print" onClick={onClose}> 
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden" onClick={e=>e.stopPropagation()}> 
                        <div className="p-4 text-white flex justify-between items-center" style={{backgroundColor: themeColor}}> 
                            <h3 className="font-bold flex items-center gap-2 text-sm"><Icon name="settings"/> CONFIGURAÇÕES</h3> 
                            <button onClick={onClose}><Icon name="x"/></button> 
                        </div> 
                        <div className="p-6 max-h-[80vh] overflow-y-auto"> 

                            {/* BOTÃO GRANDE DO MODO ESCURO AQUI */}
                            <div className="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6 cursor-pointer" onClick={()=>setIsDarkMode(!isDarkMode)}>
                                <span className="text-sm font-bold text-slate-700 uppercase flex items-center gap-2">
                                    {isDarkMode ? <Icon name="moon" className="text-blue-500"/> : <Icon name="sun" className="text-yellow-500"/>} 
                                    Modo Noite (Escuro)
                                </span>
                                <div className={`w-12 h-6 rounded-full relative transition-colors ${isDarkMode ? 'bg-blue-500' : 'bg-slate-300'}`}>
                                    <div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${isDarkMode ? 'left-7' : 'left-1'}`}></div>
                                </div>
                            </div>

                            <h4 className="font-bold text-slate-700 mb-3 text-sm uppercase">Identidade da Equipe</h4> 
                            <input className="w-full border rounded p-2 text-xs mb-3 font-bold" placeholder="Nome da Equipe" value={teamName||''} onChange={e=>setTeamName(e.target.value)} /> 
                            <input className="w-full border rounded p-2 text-xs mb-4" placeholder="URL do Escudo (Imagem)" value={teamLogo||''} onChange={e=>setTeamLogo(e.target.value)} /> 
                            
                            <h4 className="font-bold text-slate-700 mb-3 text-sm uppercase">Cor Principal</h4> 
                            <div className="flex gap-3 justify-center flex-wrap mb-6"> 
                                {themeColors.map(color => ( <div key={color} className={`color-picker-swatch ${themeColor === color ? 'active' : ''}`} style={{backgroundColor: color}} onClick={() => setThemeColor(color)}></div> ))} 
                            </div> 
                            
                            <div className="border-t border-slate-200 pt-4 flex flex-col gap-2"> 
                                <button onClick={handleExport} className="w-full bg-blue-50 text-blue-700 border-blue-200 border py-2 rounded text-xs font-bold flex items-center justify-center gap-2 hover:bg-blue-100 transition-colors"><Icon name="download"/> BAIXAR BACKUP LOCAL</button> 
                                <div className="relative"> 
                                    <input type="file" id="importFile" accept=".json" onChange={handleImport} className="hidden" />

                                </div>

                            <div className="border-t border-slate-200 mt-4 pt-4 flex flex-col gap-2"> 
                                <button onClick={handleLogout} className="w-full bg-red-500 text-white py-3 rounded text-xs font-black flex items-center justify-center gap-2 hover:bg-red-600 transition-colors shadow-md">SAIR DO SISTEMA (LOGOUT)</button>
                            </div>
                        </div> 
                    </div> 
                </div> 
            ); 
        };

        // --- OUTROS MODAIS ---
        const AnalysisModal = ({ show, onClose, themeColor, players, history, currentDate }) => {
            if (!show) return null;
            const sessionData = (history && history[currentDate]) || { ratings: {} };
            const ratings = sessionData.ratings || {};
            const rankedPlayers = Object.entries(ratings).map(([idx, rate]) => ({ ...(players[idx]||{name:'-'}), rate, idx })).filter(p => p.rate > 0).sort((a, b) => b.rate - a.rate);
            const top5 = rankedPlayers.slice(0, 5);
            const bottom5 = [...rankedPlayers].sort((a, b) => a.rate - b.rate).slice(0, 5);
            return ( <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onClick={onClose}> <div className="bg-white rounded-xl w-full max-w-lg overflow-hidden" onClick={e=>e.stopPropagation()}> <div className="p-4 flex justify-between items-center text-white" style={{background: themeColor}}><h3 className="font-bold flex items-center gap-2"><Icon name="chart"/> Análise da Sessão ({formatDateBR(currentDate)})</h3><button onClick={onClose}><Icon name="x"/></button></div> <div className="p-4 grid grid-cols-2 gap-4"> <div className="bg-green-50 rounded-xl p-3 border border-green-100"><h4 className="font-black text-green-700 uppercase text-xs mb-2 flex items-center gap-1"><Icon name="trend" className="rotate-0"/> TOP 5 (Melhores)</h4>{top5.length > 0 ? top5.map((p, i) => (<div key={i} className="flex justify-between items-center border-b border-green-200 py-1 last:border-0"><span className="text-xs font-bold text-slate-700 truncate w-24">{i+1}. {p.name}</span><div className="flex gap-1 items-center bg-white px-1.5 rounded shadow-sm"><span className="font-black text-green-600 text-xs">{p.rate}</span><Icon name="star" size={10} className="text-yellow-400"/></div></div>)) : <span className="text-xs text-slate-400 italic">Sem dados.</span>}</div> <div className="bg-red-50 rounded-xl p-3 border border-red-100"><h4 className="font-black text-red-700 uppercase text-xs mb-2 flex items-center gap-1"><Icon name="trend" className="rotate-180"/> BOTTOM 5 (Atenção)</h4>{bottom5.length > 0 ? bottom5.map((p, i) => (<div key={i} className="flex justify-between items-center border-b border-red-200 py-1 last:border-0"><span className="text-xs font-bold text-slate-700 truncate w-24">{i+1}. {p.name}</span><div className="flex gap-1 items-center bg-white px-1.5 rounded shadow-sm"><span className="font-black text-red-600 text-xs">{p.rate}</span><Icon name="star" size={10} className="text-yellow-400"/></div></div>)) : <span className="text-xs text-slate-400 italic">Sem dados.</span>}</div> </div> </div> </div> );
        };

        const SeasonStatsModal = ({ show, onClose, stats, setStats, themeColor }) => {
            if (!show) return null;
            const updateStat = (type, field, val) => { const n = { ...stats }; n[type][field] = parseInt(val) || 0; setStats(n); };
            const calculatePct = (p, w, d) => { if(!p || p === 0) return 0; const points = (w * 3) + d; const maxPoints = p * 3; return ((points / maxPoints) * 100).toFixed(1); };
            const totals = { p: (stats.league.p||0) + (stats.cup.p||0) + (stats.friendly.p||0), w: (stats.league.w||0) + (stats.cup.w||0) + (stats.friendly.w||0), d: (stats.league.d||0) + (stats.cup.d||0) + (stats.friendly.d||0), l: (stats.league.l||0) + (stats.cup.l||0) + (stats.friendly.l||0), gf: (stats.league.gf||0) + (stats.cup.gf||0) + (stats.friendly.gf||0), ga: (stats.league.ga||0) + (stats.cup.ga||0) + (stats.friendly.ga||0), };

t outline-none font-bold" placeholder="Link (YouTube, Video)..." value={item.linkUrl || ''} onChange={(e)=>updateLib(item.libId, 'linkUrl', e.target.value)} />{item.linkUrl && <a href={item.linkUrl.startsWith('http') ? item.linkUrl : `https://${item.linkUrl}`} target="_blank" className="text-[10px] bg-red-500 text-white px-2 py-1 rounded font-bold hover:bg-red-600 shadow-sm">VER</a>}</div></div></div>))}</div> </div> );

                                    </div>

                                    <div className="bg-slate-50 border-b p-2 flex justify-between items-center"><div className="flex gap-2 items-center"><span className="text-white font-bold text-xs px-2 py-1 rounded w-10 text-center" style={{backgroundColor: themeColor}}>{idx+1}</span><input className="font-bold bg-transparent outline-none uppercase text-sm w-40" value={drill.name} onChange={e=>updateDrill(idx,'name',e.target.value)}/></div><div className="flex gap-2 items-center"><select className="text-[10px] border rounded bg-white p-1 w-24" value={drill.method} onChange={e=>updateDrill(idx,'method',e.target.value)}>{activityOptions.map(o=><option key={o} value={o}>{o}</option>)}</select><div className="relative flex items-center bg-white border rounded px-2"><Icon name="clock" size={12} className="text-slate-400 mr-1"/><input className="w-8 text-[10px] font-bold outline-none text-right" value={drill.time} onChange={e=>updateDrill(idx,'time',e.target.value)}/></div><div className="flex gap-1 no-print"><button onClick={()=>moveDrill(idx, 'up')} className="text-slate-400 hover:text-blue-500"><Icon name="chevronUp" size={14}/></button><button onClick={()=>moveDrill(idx, 'down')} className="text-slate-400 hover:text-blue-500"><Icon name="chevronDown" size={14}/></button></div><button onClick={()=>setDrills(safeDrills.filter((_,i)=>i!==idx))} className="text-red-400 no-print ml-2"><Icon name="trash" size={14}/></button></div></div>

                                                <input className="flex-1 bg-transparent outline-none text-xs font-bold text-slate-700" placeholder="Link do Vídeo (YouTube, Drive...)" value={drill.linkUrl || ''} onChange={e=>updateDrill(idx,'linkUrl',e.target.value)} />
                                                {drill.linkUrl && <a href={drill.linkUrl.startsWith('http') ? drill.linkUrl : `https://${drill.linkUrl}`} target="_blank" className="bg-red-500 text-white text-[10px] font-bold px-3 py-1.5 rounded shadow hover:bg-red-600 transition">ASSISTIR</a>}
                                            </div>

                                        </div>
                                    </div>
                                </div>
                            )) : <div className="text-center p-8 text-slate-400 border-2 border-dashed rounded-xl font-bold">Nenhum exercício na sessão de hoje. Adicione abaixo ou puxe da Biblioteca.</div>}
                            <button onClick={()=>{setDrills([...safeDrills, { id: Date.now(), name: 'NOVO EXERCÍCIO', method: 'Treino Tático', dim: '-', time: '10', desc: '', variants: '', image: null, linkUrl: '' }])}} className="w-full py-4 border-2 border-dashed border-slate-300 rounded-xl text-slate-400 hover:border-blue-500 hover:text-blue-500 font-bold flex items-center justify-center gap-2 no-print transition"><Icon name="plus"/> ADICIONAR EXERCÍCIO MANUAL</button>

                    setUser(currentUser);
                    setLoadingAuth(false);
                    if(el) el.style.display = 'none';
                });

                return () => unsubscribe();
            }, []);

                return <LoginScreen themeColor="#1e3a8a" />;
            }

            return <ProCoachApp user={user} />;

            const [calendarData, setCalendarData] = useFirebaseStorage('pc_calendar_v7', {});
            const [showSettings, setShowSettings] = useState(false);
            const [boardWeekDate, setBoardWeekDate] = useState(new Date());

            const [notices, setNotices] = useFirebaseStorage('pc_notices_list', []);

            const [showStatsModal, setShowStatsModal] = useState(false);

                    [currentDate]: { ...currentSession, drills: updatedDrills }

            const currentWeekKey = getWeekKey(boardWeekDate);

                        <button onClick={()=>setTab('squad')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='squad'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='squad'?themeColor:''}}><Icon name="users"/> PLANTEL</button>
                        <button onClick={()=>setTab('lineup')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='lineup'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='lineup'?themeColor:''}}><Icon name="shirt"/> ESCALAÇÃO</button>
                        <button onClick={()=>setTab('performance')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='performance'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='performance'?themeColor:''}}><Icon name="chart"/> PERFORMANCE</button>
                        <button onClick={()=>setTab('scouting')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='scouting'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='scouting'?themeColor:''}}><Icon name="eye"/> SCOUTING</button>
                        <button onClick={()=>setTab('session')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='session'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='session'?themeColor:''}}><Icon name="list"/> SESSÃO</button>
                        <button onClick={()=>setTab('postmatch')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='postmatch'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='postmatch'?themeColor:''}}><Icon name="whistle"/> PÓS-JOGO</button>
                        <button onClick={()=>setTab('micro')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='micro'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='micro'?themeColor:''}}><Icon name="grid"/> MICRO</button>
                        <button onClick={()=>setTab('board')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='board'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='board'?themeColor:''}}><Icon name="image"/> BOARD</button> 
                        <button onClick={()=>setTab('calendar')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='calendar'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='calendar'?themeColor:''}}><Icon name="calendar"/> CALEND</button>
                        <button onClick={()=>setTab('library')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='library'?'bg-white shadow':'text-slate-400 hover:text-slate-600'}`} style={{color: tab==='library'?themeColor:''}}><Icon name="book"/> BIBLIOTECA</button>
                    </div>

                    <div className="flex-1 overflow-hidden relative">
                        {tab === 'dashboard' && <DashboardView themeColor={themeColor} players={players} matchHistory={matchHistory} setTab={setTab} teamLogo={teamLogo} scoutingData={scoutingData} microData={microData} calendarData={calendarData} header={header} seasonStats={seasonStats} openStats={()=>setShowStatsModal(true)} noticeBoard={noticeBoard} setNoticeBoard={setNoticeBoard} notices={notices} setNotices={setNotices} />}
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} history={sessionHistory} />}
                        {tab === 'lineup' && <SmartLineupView players={players} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'performance' && <PerformanceView players={players} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'scouting' && <ScoutingView themeColor={themeColor} scoutingData={scoutingData} setScoutingData={setScoutingData} scoutingHistory={scoutingHistory} setScoutingHistory={setScoutingHistory} />}
                        {tab === 'session' && <SessionView drills={sessionDrills} setDrills={setSessionDrills} header={header} setHeader={setHeader} logo={teamLogo} themeColor={themeColor} players={players} history={sessionHistory} setHistory={setSessionHistory} sessionDate={sessionDate} setSessionDate={setSessionDate} teamName={teamName} />}
                        {tab === 'postmatch' && <PostMatchView themeColor={themeColor} matchData={matchData} setMatchData={setMatchData} players={players} setPlayers={setPlayers} matchHistory={matchHistory} setMatchHistory={setMatchHistory} teamLogo={teamLogo} />}
                        {tab === 'micro' && <MicrocycleView micro={microData} setMicro={setMicroData} themeColor={themeColor} calendar={calendarData} />}
                        {tab === 'board' && <VisualBoardView currentWeekStart={currentWeekStart} changeWeek={changeBoardWeek} boardData={currentBoardData} updateBoardData={updateBoardData} themeColor={themeColor} />}
                        {tab === 'calendar' && <CalendarView calendar={calendarData} setCalendar={setCalendarData} themeColor={themeColor} notices={notices} />}
                        {tab === 'library' && <LibraryView libraryDrills={libraryDrills} setLibraryDrills={setLibraryDrills} onAddToSession={handleAddToSession} onAddToBoard={handleAddToBoardFromLibrary} themeColor={themeColor} />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
