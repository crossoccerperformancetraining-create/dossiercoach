        const { useState, useEffect, useRef, useMemo } = React;

        // --- HOOK DE DADOS: LOCAL + CLOUD (COM PROTEÇÃO CONTRA FALHAS) ---
        const useFirebaseStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });

            useEffect(() => {
                const user = firebase.auth().currentUser;
                if (user) {
                    db.collection('users').doc(user.uid).collection('data').doc(key)
                      .get().then(doc => {
                          if (doc.exists) {
                              try {
                                  const parsed = JSON.parse(doc.data().value);
                                  if(parsed !== null && parsed !== undefined) {
                                      setStoredValue(parsed);
                                      window.localStorage.setItem(key, doc.data().value);
                                  }
                              } catch(e) { console.error("Erro JSON nuvem", e); }
                          }
                      }).catch(err => console.log("Offline", err));
                }
            }, [key]);

            useEffect(() => {
                const strVal = JSON.stringify(storedValue !== undefined ? storedValue : initialValue);
                window.localStorage.setItem(key, strVal);
                const user = firebase.auth().currentUser;
                if (user) {
                    db.collection('users').doc(user.uid).collection('data').doc(key)
                      .set({ value: strVal, updated_at: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true })
                      .catch(err => console.log("Salvo localmente.", err));
                }
            }, [key, storedValue, initialValue]);

            return [storedValue, setStoredValue];
        };

            const [isOnline, setIsOnline] = useState(navigator.onLine);
            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);
            return (
                <div className={`w-full text-center text-[10px] font-bold text-white py-1 z-50 transition-colors shadow-md no-print ${isOnline ? 'bg-green-500' : 'bg-red-500'}`}>

                <div className="h-screen w-screen flex flex-col items-center justify-center bg-slate-900 p-4 relative overflow-hidden">
                    <div className="absolute inset-0 bg-black/40 z-0"></div>
                    <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm z-10 relative">
                        <div className="flex justify-center mb-6">
                            <div className="w-20 h-20 rounded-full flex items-center justify-center text-white shadow-lg" style={{backgroundColor: themeColor}}>
                                <Icon name="shield" size={40} />
                            </div>
                        </div>
                        <h2 className="text-2xl font-black text-center text-slate-800 mb-1">PROCOACH V2106</h2>
                        <p className="text-center text-xs font-bold text-slate-400 uppercase mb-6 tracking-widest">Acesso Restrito</p>
                        {error && <div className="bg-red-50 text-red-500 text-xs font-bold p-3 rounded mb-4 text-center border border-red-200">{error}</div>}
                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase">E-mail</label>
                                <input type="email" required className="w-full border-b-2 border-slate-200 p-2 font-bold text-slate-700 outline-none focus:border-blue-500 bg-transparent" value={email} onChange={e=>setEmail(e.target.value)} placeholder="coach@email.com" />
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase">Senha</label>
                                <input type="password" required className="w-full border-b-2 border-slate-200 p-2 font-bold text-slate-700 outline-none focus:border-blue-500 bg-transparent" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" />
                            </div>
                            <button type="submit" disabled={loading} className={`w-full text-white font-black py-3 rounded-lg mt-6 shadow-lg transition-opacity flex justify-center items-center gap-2 ${loading ? 'opacity-50' : 'hover:opacity-90'}`} style={{backgroundColor: themeColor}}>
                                {loading ? 'CONECTANDO...' : <><Icon name="check" size={18} /> ENTRAR NO SISTEMA</>}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- COMPONENTES AUXILIARES TÁTICOS ---
        const OscillationChart = ({ sessions, color }) => {
            if(!sessions || sessions.length < 2) return <div className="h-32 flex items-center justify-center text-xs text-slate-400">Dados insuficientes.</div>;
            const h = 100, w = 250, pad = 20; const pts = sessions.slice(-10).map((s, i, arr) => { const x = pad + (i / (arr.length - 1)) * (w - 2*pad); const y = h - pad - ((s.rating / 5) * (h - 2*pad)); return `${x},${y}`; }).join(' ');
            return (<svg viewBox={`0 0 ${w} ${h}`} className="w-full h-32 bg-slate-50 rounded border border-slate-100"><polyline points={pts} fill="none" stroke={color} strokeWidth="2" />{sessions.slice(-10).map((s, i, arr) => { const x = pad + (i / (arr.length - 1)) * (w - 2*pad); const y = h - pad - ((s.rating / 5) * (h - 2*pad)); return <circle key={i} cx={x} cy={y} r="3" fill={color} />; })}</svg>);
        };

        const PositionalBarChart = ({ players, color }) => {
            if(!players || players.length === 0) return null;
            const maxRating = 5;
            return (
                <div className="flex items-end justify-around h-32 gap-2 border-b border-slate-200 p-2">
                    {players.map((p, i) => (
                        <div key={i} className="flex flex-col items-center flex-1">
                            <div className="text-[10px] font-bold mb-1">{p.avg}</div>
                            <div className="w-full bg-slate-200 rounded-t-sm relative group">
                                <div className="absolute bottom-0 left-0 right-0 rounded-t-sm transition-all" style={{height: `${(p.avg / maxRating) * 100}%`, backgroundColor: color}}></div>
                            </div>
                            <div className="text-[8px] font-bold text-slate-500 mt-1 truncate w-12 text-center">{p.name}</div>
                        </div>
                    ))}
                </div>
            );
        };

        const VerticalPitch = ({ size }) => {
            return ( <div className="w-full h-32 rounded border border-slate-300 relative overflow-hidden flex items-center justify-center grass-pattern shadow-inner group"><svg className="absolute inset-0 w-full h-full p-2 opacity-80" viewBox="0 0 100 140" fill="none" stroke="white" strokeWidth="1.5"><rect x="5" y="5" width="90" height="130" /><line x1="5" y1="70" x2="95" y2="70" /><circle cx="50" cy="70" r="12" /><rect x="25" y="5" width="50" height="20" /><rect x="38" y="5" width="24" height="8" /><path d="M 40 25 Q 50 32 60 25" strokeLinecap="round" /><path d="M 5 10 Q 10 5 10 5" /><path d="M 90 5 Q 90 10 95 10" /><rect x="25" y="115" width="50" height="20" /><rect x="38" y="127" width="24" height="8" /><path d="M 40 115 Q 50 108 60 115" strokeLinecap="round" /><path d="M 5 130 Q 10 135 10 135" /><path d="M 95 130 Q 90 135 90 135" /></svg>{size === 'Pequeno' && <div className="absolute inset-0 flex items-center justify-center"><div className="w-[40%] h-[30%] bg-yellow-400/50 border-2 border-yellow-300 rounded shadow-[0_0_20px_rgba(250,204,21,0.6)] animate-pulse z-10 mix-blend-overlay"></div></div>}{size === 'Médio' && <div className="absolute inset-0 flex items-center justify-center"><div className="w-[90%] h-[50%] bg-yellow-400/40 border-2 border-yellow-300 shadow-[0_0_20px_rgba(250,204,21,0.5)] animate-pulse z-10 mix-blend-overlay"></div></div>}{size === 'Grande' && <div className="absolute inset-0 bg-yellow-400/30 border-4 border-yellow-300 animate-pulse z-10 mix-blend-overlay"></div>}{!size && <div className="absolute inset-0 bg-black/20 flex items-center justify-center z-20"><span className="text-[9px] text-white font-bold bg-black/50 px-2 rounded backdrop-blur-sm">DEFINIR ESPAÇO</span></div>}</div> );
        };

        const RadarChart = ({ data, size = 120, color = "#3b82f6" }) => {
            const scale = size / 2.5; const center = size / 2; 
            const safeData = data || { r:0, g:0, p:0, a:0 };
            const values = [safeData.r, safeData.g, safeData.p, safeData.a]; 
            const points = values.map((val, i) => { const angle = (Math.PI / 2) * i - Math.PI / 2; return [center + Math.cos(angle) * (val * scale), center + Math.sin(angle) * (val * scale)]; });
            const pointsStr = points.map(p => p.join(',')).join(' ');
            return (<div className="relative flex items-center justify-center"><svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="overflow-visible"><circle cx={center} cy={center} r={scale} fill="none" stroke="#e2e8f0" strokeWidth="1" strokeDasharray="2,2"/><line x1={center} y1={center - scale} x2={center} y2={center + scale} stroke="#cbd5e1" strokeWidth="1" /><line x1={center - scale} y1={center} x2={center + scale} y2={center} stroke="#cbd5e1" strokeWidth="1" /><polygon points={pointsStr} fill={color} fillOpacity="0.3" stroke={color} strokeWidth="2" /><text x={center} y={center - scale - 10} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#64748b">NOTA</text><text x={center + scale + 10} y={center + 3} textAnchor="start" fontSize="9" fontWeight="bold" fill="#64748b">GOLS</text><text x={center} y={center + scale + 12} textAnchor="middle" fontSize="9" fontWeight="bold" fill="#64748b">PRES</text><text x={center - scale - 10} y={center + 3} textAnchor="end" fontSize="9" fontWeight="bold" fill="#64748b">AST</text></svg></div>);
        };

        // --- MODAL CONFIG ---
        const SettingsModal = ({ show, onClose, themeColor, setThemeColor, teamLogo, setTeamLogo, teamName, setTeamName, isDarkMode, setIsDarkMode }) => {
            if (!show) return null;
            const handleExport = () => { 
                const data = {}; 
                for (let i = 0; i < localStorage.length; i++) { 
                    const key = localStorage.key(i); 
                    if (key.startsWith('pc_')) { data[key] = localStorage.getItem(key); } 
                } 
                const blob = new Blob([JSON.stringify(data)], {type: 'application/json'}); 
                const url = URL.createObjectURL(blob); 
                const a = document.createElement('a'); 
                a.href = url; 
                a.download = `procoach_backup_${new Date().toISOString().slice(0,10)}.json`; 
                document.body.appendChild(a); 
                a.click(); 
                document.body.removeChild(a); 
                URL.revokeObjectURL(url); 
            };

            const handleImport = (event) => { 
                const file = event.target.files[0]; 
                if (!file) return; 
                const reader = new FileReader(); 
                reader.onload = (e) => { 
                    try { 
                        const data = JSON.parse(e.target.result); 
                        Object.keys(data).forEach(key => localStorage.setItem(key, data[key])); 
                        alert("Backup restaurado com sucesso! O sistema será recarregado."); 
                        window.location.reload(); 
                    } catch (error) { alert("Erro ao ler arquivo de backup."); } 
                }; 
                reader.readAsText(file); 
            };

            const handleLogout = () => {
                if(window.confirm("Tem certeza que deseja sair do sistema?")) {
                    firebase.auth().signOut().then(() => {
                        window.location.reload();
                    });
                }
            };

            return ( 
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm no-print" onClick={(e) => { e.preventDefault(); e.stopPropagation(); onClose(); }}> 
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden" onClick={e=>e.stopPropagation()}> 
                        <div className="p-4 text-white flex justify-between items-center" style={{backgroundColor: themeColor}}> 
                            <h3 className="font-bold flex items-center gap-2 text-sm"><Icon name="settings"/> CONFIGURAÇÕES</h3> 
                            <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); onClose(); }}><Icon name="x"/></button> 
                        </div> 
                        <div className="p-6 max-h-[80vh] overflow-y-auto"> 
                            <div className="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6 cursor-pointer" onClick={()=>setIsDarkMode(!isDarkMode)}>
                                <span className="text-sm font-bold text-slate-700 uppercase flex items-center gap-2">{isDarkMode ? <Icon name="moon" className="text-blue-500"/> : <Icon name="sun" className="text-yellow-500"/>} Modo Noite (Escuro)</span>
                                <div className={`w-12 h-6 rounded-full relative transition-colors ${isDarkMode ? 'bg-blue-500' : 'bg-slate-300'}`}><div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${isDarkMode ? 'left-7' : 'left-1'}`}></div></div>
                            </div>
                            <h4 className="font-bold text-slate-700 mb-3 text-sm uppercase">Identidade da Equipe</h4> 
                            <input className="w-full border rounded p-2 text-xs mb-3 font-bold" placeholder="Nome da Equipe" value={teamName||''} onChange={e=>setTeamName(e.target.value)} /> 
                            <input className="w-full border rounded p-2 text-xs mb-4" placeholder="URL do Escudo (Imagem)" value={teamLogo||''} onChange={e=>setTeamLogo(e.target.value)} /> 
                            <h4 className="font-bold text-slate-700 mb-3 text-sm uppercase">Cor Principal</h4> 
                            <div className="flex gap-3 justify-center flex-wrap mb-6"> 
                                {themeColors.map(color => ( <div key={color} className={`color-picker-swatch ${themeColor === color ? 'active' : ''}`} style={{backgroundColor: color}} onClick={() => setThemeColor(color)}></div> ))} 
                            </div> 
                            <div className="border-t border-slate-200 pt-4 flex flex-col gap-2"> 
                                <button type="button" onClick={handleExport} className="w-full bg-blue-50 text-blue-700 border-blue-200 border py-2 rounded text-xs font-bold flex items-center justify-center gap-2 hover:bg-blue-100 transition-colors"><Icon name="download"/> BAIXAR BACKUP LOCAL</button> 
                                <div className="relative"> 
                                    <input type="file" id="importFile" accept=".json" onChange={handleImport} className="hidden" /> 
                                    <label htmlFor="importFile" className="w-full bg-green-50 text-green-700 border-green-200 border py-2 rounded text-xs font-bold flex items-center justify-center gap-2 cursor-pointer hover:bg-green-100 transition-colors"><Icon name="upload"/> RESTAURAR BACKUP</label> 
                                </div> 
                            </div> 
                            <div className="border-t border-slate-200 mt-4 pt-4 flex flex-col gap-2"> 
                                <button type="button" onClick={handleLogout} className="w-full bg-red-500 text-white py-3 rounded text-xs font-black flex items-center justify-center gap-2 hover:bg-red-600 transition-colors shadow-md">SAIR DO SISTEMA (LOGOUT)</button>
                            </div>
                        </div> 
                    </div> 
                </div> 
            ); 
        };

        // --- MODAL DE ESTATÍSTICA BLINDADO ---
        const SeasonStatsModal = ({ show, onClose, stats, setStats, themeColor }) => {
            if (!show) return null;
            const safeStats = stats || {};
            const updateStat = (type, field, val) => { const n = { ...safeStats }; if(!n[type]) n[type]={}; n[type][field] = parseInt(val) || 0; setStats(n); };
            const calculatePct = (p, w, d) => { 
                p = Number(p) || 0; w = Number(w) || 0; d = Number(d) || 0;
                if(p === 0) return 0; 
                return (((w * 3) + d) / (p * 3) * 100).toFixed(1); 
            };
            
            const l = safeStats.league || {};
            const c = safeStats.cup || {};
            const f = safeStats.friendly || {};

            const totals = { 
                p: (Number(l.p)||0) + (Number(c.p)||0) + (Number(f.p)||0), 
                w: (Number(l.w)||0) + (Number(c.w)||0) + (Number(f.w)||0), 
                d: (Number(l.d)||0) + (Number(c.d)||0) + (Number(f.d)||0), 
                l: (Number(l.l)||0) + (Number(c.l)||0) + (Number(f.l)||0), 
                gf: (Number(l.gf)||0) + (Number(c.gf)||0) + (Number(f.gf)||0), 
                ga: (Number(l.ga)||0) + (Number(c.ga)||0) + (Number(f.ga)||0), 
            };
            const totalPct = calculatePct(totals.p, totals.w, totals.d);
            
            const handleClose = (e) => {
                e.preventDefault();
                e.stopPropagation();
                onClose();
            };

            return ( 
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onClick={handleClose}> 
                    <div className="bg-white rounded-xl w-full max-w-3xl overflow-hidden shadow-2xl" onClick={e=>e.stopPropagation()}> 
                        <div className="p-4 text-white flex justify-between items-center" style={{backgroundColor: themeColor}}>
                            <h3 className="font-bold flex items-center gap-2"><Icon name="chart"/> ESTATÍSTICAS DA TEMPORADA</h3>
                            <button type="button" onClick={handleClose}><Icon name="x"/></button>
                        </div> 
                        <div className="p-4 overflow-x-auto">
                            <table className="w-full text-center text-xs">
                                <thead className="font-bold uppercase text-slate-500 bg-slate-100">
                                    <tr><th className="p-2 text-left">Competição</th><th>Jogos</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th><th>% Aprov.</th></tr>
                                </thead>
                                <tbody>
                                    {['league', 'cup', 'friendly'].map(type => { 
                                        const s = safeStats[type] || {p:0, w:0, d:0, l:0, gf:0, ga:0}; 
                                        const pct = calculatePct(s.p, s.w, s.d); 
                                        const sg = (Number(s.gf)||0) - (Number(s.ga)||0); 
                                        return ( 
                                            <tr key={type} className="border-b">
                                                <td className="p-2 text-left font-bold uppercase">{type === 'league' ? 'Camp.' : type === 'cup' ? 'Copa' : 'Amistoso'}</td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded bg-transparent" value={s.p||0} onChange={e=>updateStat(type, 'p', e.target.value)}/></td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded bg-green-50 text-green-700 font-bold" value={s.w||0} onChange={e=>updateStat(type, 'w', e.target.value)}/></td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded bg-gray-50 text-gray-700 font-bold" value={s.d||0} onChange={e=>updateStat(type, 'd', e.target.value)}/></td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded bg-red-50 text-red-700 font-bold" value={s.l||0} onChange={e=>updateStat(type, 'l', e.target.value)}/></td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded bg-transparent" value={s.gf||0} onChange={e=>updateStat(type, 'gf', e.target.value)}/></td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded bg-transparent" value={s.ga||0} onChange={e=>updateStat(type, 'ga', e.target.value)}/></td>
                                                <td className={`p-1 font-bold ${sg > 0 ? 'text-green-600' : sg < 0 ? 'text-red-600' : 'text-gray-400'}`}>{sg}</td>
                                                <td className="p-1 font-black">{pct}%</td>
                                            </tr> 
                                        ) 
                                    })}
                                    <tr className="bg-slate-50 font-black text-slate-800 border-t-2 border-slate-200">
                                        <td className="p-3 text-left">TOTAL</td><td>{totals.p}</td><td className="text-green-600">{totals.w}</td><td className="text-gray-600">{totals.d}</td><td className="text-red-600">{totals.l}</td><td>{totals.gf}</td><td>{totals.ga}</td><td>{(totals.gf - totals.ga)}</td><td className={`${totalPct > 60 ? 'text-green-600' : totalPct < 40 ? 'text-red-600' : 'text-blue-600'}`}>{totalPct}%</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div> 
                        <div className="p-4 border-t border-slate-200 bg-slate-50">
                            <button type="button" onClick={handleClose} className="w-full bg-slate-800 text-white font-bold py-3 rounded-lg hover:bg-slate-700 transition shadow-sm text-xs">FECHAR ESTATÍSTICAS (SALVO AUTO)</button>
                        </div> 
                    </div> 
                </div> 
            );
        };

        // --- MODAL DE ALERTAS (SINO) ---
        const AlertsModal = ({ show, onClose, alerts, themeColor }) => {
            if (!show) return null;
            return (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm no-print" onClick={onClose}>
                    <div className="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl" onClick={e=>e.stopPropagation()}>
                        <div className="p-4 text-white flex justify-between items-center" style={{backgroundColor: themeColor}}>
                            <h3 className="font-bold flex items-center gap-2 text-sm"><Icon name="bell"/> RADAR DE DESEMPENHO</h3>
                            <button type="button" onClick={onClose}><Icon name="x"/></button>
                        </div>
                        <div className="p-4 max-h-[70vh] overflow-y-auto bg-slate-50">
                            <p className="text-[10px] text-slate-500 font-bold uppercase mb-4 text-center">Avisos baseados nas últimas 3 sessões</p>
                            
                            {(!alerts || alerts.length === 0) ? (
                                <div className="text-center py-8 text-slate-400">
                                    <Icon name="check" size={32} className="mx-auto mb-2 opacity-50 text-green-500" />
                                    <span className="text-xs font-bold block">Tudo limpo!</span>
                                    <span className="text-[10px]">Nenhum atleta com média baixa ou excesso de faltas.</span>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    {alerts.map((al, idx) => (
                                        <div key={idx} className={`p-3 rounded-lg border-l-4 shadow-sm bg-white flex flex-col gap-1 ${al.type === 'absence' ? 'border-l-red-500' : 'border-l-yellow-500'}`}>
                                            <div className="flex items-center gap-2">
                                                <span className="font-black text-slate-700 text-xs uppercase">{al.player}</span>
                                                <span className={`text-[8px] font-bold px-1.5 py-0.5 rounded text-white ${al.type === 'absence' ? 'bg-red-500' : 'bg-yellow-500'}`}>
                                                    {al.type === 'absence' ? 'FALTAS' : 'RENDIMENTO'}
                                                </span>
                                            </div>
                                            <span className="text-[10px] text-slate-500 font-bold">{al.msg}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- OUTROS MODAIS ---
        const AnalysisModal = ({ show, onClose, themeColor, players, history, currentDate }) => {
            if (!show) return null;
            const safePlayers = players || [];
            const safeHistory = history || {};
            const sessionData = safeHistory[currentDate] || { ratings: {} };
            const ratings = sessionData.ratings || {};
            const rankedPlayers = Object.entries(ratings).map(([idx, rate]) => ({ ...(safePlayers[idx]||{name:'-'}), rate, idx })).filter(p => p.rate > 0).sort((a, b) => b.rate - a.rate);
            const top5 = rankedPlayers.slice(0, 5);
            const bottom5 = [...rankedPlayers].sort((a, b) => a.rate - b.rate).slice(0, 5);
            return ( <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onClick={onClose}> <div className="bg-white rounded-xl w-full max-w-lg overflow-hidden" onClick={e=>e.stopPropagation()}> <div className="p-4 flex justify-between items-center text-white" style={{background: themeColor}}><h3 className="font-bold flex items-center gap-2"><Icon name="chart"/> Análise da Sessão ({formatDateBR(currentDate)})</h3><button type="button" onClick={onClose}><Icon name="x"/></button></div> <div className="p-4 grid grid-cols-2 gap-4"> <div className="bg-green-50 rounded-xl p-3 border border-green-100"><h4 className="font-black text-green-700 uppercase text-xs mb-2 flex items-center gap-1"><Icon name="trend" className="rotate-0"/> TOP 5 (Melhores)</h4>{top5.length > 0 ? top5.map((p, i) => (<div key={i} className="flex justify-between items-center border-b border-green-200 py-1 last:border-0"><span className="text-xs font-bold text-slate-700 truncate w-24">{i+1}. {p.name}</span><div className="flex gap-1 items-center bg-white px-1.5 rounded shadow-sm"><span className="font-black text-green-600 text-xs">{p.rate}</span><Icon name="star" size={10} className="text-yellow-400"/></div></div>)) : <span className="text-xs text-slate-400 italic">Sem dados.</span>}</div> <div className="bg-red-50 rounded-xl p-3 border border-red-100"><h4 className="font-black text-red-700 uppercase text-xs mb-2 flex items-center gap-1"><Icon name="trend" className="rotate-180"/> BOTTOM 5 (Atenção)</h4>{bottom5.length > 0 ? bottom5.map((p, i) => (<div key={i} className="flex justify-between items-center border-b border-red-200 py-1 last:border-0"><span className="text-xs font-bold text-slate-700 truncate w-24">{i+1}. {p.name}</span><div className="flex gap-1 items-center bg-white px-1.5 rounded shadow-sm"><span className="font-black text-red-600 text-xs">{p.rate}</span><Icon name="star" size={10} className="text-yellow-400"/></div></div>)) : <span className="text-xs text-slate-400 italic">Sem dados.</span>}</div> </div> </div> </div> );
        };

        const PlayerProfileModal = ({ player, playerIndex, themeColor, onClose, onUpdate, onUpdateStat, history }) => {
            if (!player) return null;
            const toggleAttr = (attr) => { const current = player.attributes || []; if (current.includes(attr)) onUpdate('attributes', current.filter(a => a !== attr)); else onUpdate('attributes', [...current, attr]); };
            const isAttr = (attr) => (player.attributes || []).includes(attr);
            
            const playerHistory = useMemo(() => {
                if(!history) return [];
                return Object.entries(history)
                    .map(([date, data]) => ({ date, rating: (data.ratings && data.ratings[playerIndex]) || 0 }))
                    .filter(x => x.rating > 0)
                    .sort((a,b) => new Date(b.date) - new Date(a.date));
            }, [history, playerIndex]);

            }, [safePlayers, history]);

            const slots = [
                { id: 0, label: 'GOL', top: '88%', left: '50%', role: 'Goleiro' }, 
                { id: 1, label: 'LAD', top: '65%', left: '85%', role: 'Lat. Dir.' }, 
                { id: 2, label: 'ZAG', top: '75%', left: '65%', role: 'Zagueiro' }, 
                { id: 3, label: 'ZAG', top: '75%', left: '35%', role: 'Zagueiro' }, 
                { id: 4, label: 'LAE', top: '65%', left: '15%', role: 'Lat. Esq.' }, 
                { id: 5, label: 'VOL', top: '55%', left: '50%', role: 'Volante' }, 
                { id: 6, label: 'MEI', top: '40%', left: '70%', role: 'Meia' }, 
                { id: 7, label: 'MEI', top: '40%', left: '30%', role: 'Meia' }, 
                { id: 8, label: 'EXT', top: '25%', left: '85%', role: 'Extremo' }, 
                { id: 9, label: 'EXT', top: '25%', left: '15%', role: 'Extremo' }, 
                { id: 10, label: 'ATA', top: '12%', left: '50%', role: 'Atacante' },
            ];

            const handleSlotClick = (slot) => {
                setSelectedSlot(slot.id);
                setViewFilter(slot.role);
            };

            const handleSelectPlayer = (player) => {
                const newLineup = [...lineup];
                newLineup[selectedSlot] = player;
                setLineup(newLineup);
                setSelectedSlot(null);
                setViewFilter('ALL');
            };

            const getTop5ByPos = (posLabel, posFilter) => {
                const filtered = processedPlayers.filter(p => p.pos === posFilter).sort((a,b) => b.avg - a.avg).slice(0, 5);
                return (
                    <div className="bg-white rounded-lg shadow-sm border border-slate-200 p-3 flex-1 min-w-[200px]">
                        <h4 className="font-bold text-xs uppercase text-blue-700 border-b pb-2 mb-2">{posLabel} - TOP 5</h4>
                        {filtered.length > 0 ? filtered.map((p, i) => (
                            <div key={i} className="flex justify-between items-center py-1 border-b border-slate-50 last:border-0">
                                <div className="flex gap-2 items-center">
                                    <span className="text-xs text-slate-400 w-3">{i+1}.</span>
                                    <span className="text-xs font-bold text-slate-700 truncate max-w-[100px]">{p.name}</span>
                                </div>
                                <span className="font-black text-xs">{p.avg}</span>
                            </div>
                        )) : <span className="text-xs text-slate-400 italic">Vazio</span>}
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full bg-slate-50 overflow-y-auto">
                    <div className="w-full h-[60vh] relative grass-pattern border-b-4 border-slate-300 shadow-inner overflow-hidden shrink-0">
                        <div className="absolute inset-0 opacity-30 bg-[linear-gradient(0deg,transparent_50%,rgba(255,255,255,0.1)_50%)] bg-[length:100%_100px]"></div>
                        <div className="absolute top-0 left-[10%] right-[10%] h-[15%] border-b-2 border-white/50 border-x-2"></div>
                        <div className="absolute bottom-0 left-[25%] right-[25%] h-[15%] border-t-2 border-white/50 border-x-2"></div>
                        <div className="absolute top-1/2 left-0 right-0 h-0.5 bg-white/40"></div>
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 border-2 border-white/40 rounded-full"></div>

                        {slots.map((slot) => (
                            <div key={slot.id} onClick={() => handleSlotClick(slot)} className="absolute -translate-x-1/2 -translate-y-1/2 flex flex-col items-center cursor-pointer hover:scale-110 transition-transform z-10" style={{ top: slot.top, left: slot.left }}>
                                {lineup[slot.id] && <div className="mb-1 bg-yellow-500 text-slate-900 text-[10px] font-black px-1.5 rounded-full shadow border border-white">{lineup[slot.id].avg}</div>}
                                <div className={`w-12 h-12 rounded-full border-2 shadow-lg flex items-center justify-center overflow-hidden ${lineup[slot.id] ? 'bg-white border-white' : 'bg-slate-800/80 border-white/50 backdrop-blur-sm'}`}>
                                    {lineup[slot.id] ? <img src={lineup[slot.id].image} className="w-full h-full object-cover"/> : <span className="text-white font-bold text-[10px]">{slot.label}</span>}
                                </div>
                                {lineup[slot.id] ? (
                                    <div className="mt-1 bg-black/80 text-white text-[9px] px-2 py-0.5 rounded font-bold uppercase shadow">{lineup[slot.id].name.split(' ')[0]}</div>
                                ) : (
                                    <div className="mt-1 text-white text-[8px] font-bold uppercase drop-shadow-md opacity-70">Vazio</div>
                                )}
                            </div>
                        ))}
                    </div>

                    <div className="p-4">
                        <h3 className="font-bold text-slate-700 flex items-center gap-2 mb-4"><Icon name="trophy" className="text-yellow-500"/> Top 5 - Médias por Posição</h3>
                        <div className="flex gap-4 overflow-x-auto pb-4">
                            {viewFilter !== 'ALL' ? (
                                <div className="w-full max-w-sm">
                                    <div className="flex justify-between items-center mb-2"><span className="text-sm font-bold text-blue-600">Selecionando para: {viewFilter}</span><button type="button" onClick={()=>setViewFilter('ALL')} className="text-xs text-slate-400 underline">Ver Todos</button></div>
                                    <div className="bg-blue-50 rounded-lg p-2 mb-2 border border-blue-100">
                                        <div className="text-[10px] uppercase font-bold text-slate-400 mb-1">Jogadores Disponíveis</div>
                                        {processedPlayers.filter(p => p.pos === viewFilter).sort((a,b)=>b.avg-a.avg).map(p => (
                                            <div key={p.idx} onClick={()=>handleSelectPlayer(p)} className="bg-white p-2 rounded mb-1 flex justify-between items-center cursor-pointer hover:bg-blue-100 border border-slate-100">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-6 h-6 rounded-full bg-slate-200 overflow-hidden">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="users" size={12}/>}</div>
                                                    <span className="text-xs font-bold">{p.name}</span>
                                                </div>
                                                <span className="font-black text-sm text-blue-600">{p.avg}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <>
                                    {getTop5ByPos('GR - Top 5', 'Goleiro')}
                                    {getTop5ByPos('ZAG - Top 5', 'Zagueiro')}
                                    {getTop5ByPos('LAT - Top 5', 'Lat. Dir.')}
                                    {getTop5ByPos('VOL - Top 5', 'Volante')}
                                    {getTop5ByPos('MEI - Top 5', 'Meia')}
                                    {getTop5ByPos('EXT - Top 5', 'Extremo')}
                                    {getTop5ByPos('CA - Top 5', 'Atacante')}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const PerformanceView = ({ players, history, themeColor }) => {
            const [selectedPlayer, setSelectedPlayer] = useState(null); 
            const [viewMode, setViewMode] = useState('ranking'); 
            const safePlayers = players || [];
            
            const processedData = useMemo(() => {
                const stats = {}; safePlayers.forEach((_, i) => { stats[i] = { total: 0, count: 0, sessions: [] }; });
                if(history) { Object.entries(history).forEach(([dateStr, data]) => { if(data.ratings) { Object.entries(data.ratings).forEach(([pIdx, rating]) => { if(stats[pIdx]) { stats[pIdx].total += rating; stats[pIdx].count += 1; stats[pIdx].sessions.push({ date: dateStr, rating }); } }); } }); }
                return Object.keys(stats).map(idx => { const s = stats[idx]; return { idx: parseInt(idx), name: safePlayers[idx]?.name || '?', image: safePlayers[idx]?.image, pos: safePlayers[idx]?.pos, avg: s.count > 0 ? (s.total / s.count).toFixed(1) : 0, count: s.count, sessions: s.sessions.sort((a,b) => new Date(a.date) - new Date(b.date)) }; }).sort((a,b) => b.avg - a.avg);
            }, [safePlayers, history]);
            
            const getRadarData = (p) => { 
                const pl = safePlayers[p.idx] || {}; 
                const maxG = Math.max(...safePlayers.map(x=>x.stats?.g||0)) || 1; 
                const maxA = Math.max(...safePlayers.map(x=>x.stats?.a||0)) || 1; 
                const maxP = Math.max(...processedData.map(x=>x.count)) || 1; 
                return { g: (pl.stats?.g||0) / maxG, a: (pl.stats?.a||0) / maxA, p: p.count / maxP, r: (p.avg || 0) / 5 }; 
            };
            
            const groupedByPos = useMemo(() => { const groups = {}; positions.forEach(pos => groups[pos] = []); processedData.forEach(p => { if(groups[p.pos]) groups[p.pos].push(p); }); return groups; }, [processedData]);

            const getComparisonChart = (pos) => {
                const list = groupedByPos[pos] || [];
                if(list.length === 0) return null;
                return <PositionalBarChart players={list} color={themeColor} />;
            };

            return ( 
                <div className="p-4 bg-slate-50 h-full overflow-hidden flex flex-col md:flex-row gap-4 animate-fade-in"> 
                    <div className="flex-1 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden"> 
                        <div className="p-4 border-b bg-white flex justify-between items-center">
                            <h2 className="font-bold text-slate-700 flex items-center gap-2"><Icon name="chart"/> PERFORMANCE</h2>
                            <div className="flex bg-slate-100 rounded p-1 gap-1">
                                <button type="button" onClick={()=>setViewMode('ranking')} className={`px-3 py-1 text-[10px] font-bold rounded transition-colors ${viewMode==='ranking'?'text-white shadow':'text-slate-400'}`} style={viewMode==='ranking'?{backgroundColor: themeColor}:{}}>GERAL</button>
                                <button type="button" onClick={()=>setViewMode('position')} className={`px-3 py-1 text-[10px] font-bold rounded transition-colors ${viewMode==='position'?'text-white shadow':'text-slate-400'}`} style={viewMode==='position'?{backgroundColor: themeColor}:{}}>COMPARAR POSIÇÃO</button>
                            </div>
                        </div> 
                        <div className="flex-1 overflow-y-auto p-2"> 
                            {viewMode === 'ranking' ? ( 
                                <table className="w-full text-left border-collapse"><thead className="text-[10px] uppercase text-slate-400 font-bold sticky top-0 bg-white"><tr><th className="p-2">#</th><th className="p-2">Atleta</th><th className="p-2 text-center">Média</th></tr></thead><tbody className="text-xs">{processedData.map((p, i) => (<tr key={p.idx} onClick={() => setSelectedPlayer(p)} className={`border-b border-slate-50 cursor-pointer hover:bg-slate-50 ${selectedPlayer?.idx === p.idx ? 'bg-blue-50' : ''}`}><td className="p-2 font-black text-slate-300 w-8">{i+1}</td><td className="p-2 flex items-center gap-2"><div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden shrink-0 border">{p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user"/>}</div><div><div className="font-bold text-slate-700 truncate">{p.name}</div><div className="text-[9px] text-slate-400">{p.pos}</div></div></td><td className="p-2 text-center"><span className={`px-2 py-1 rounded font-bold text-white ${parseFloat(p.avg)>=4 ? 'bg-green-500' : parseFloat(p.avg)>=3 ? 'bg-yellow-500' : 'bg-red-500'}`}>{p.avg}</span></td></tr>))}</tbody></table> 
                            ) : ( 
                                <div className="space-y-6 p-2">
                                    {Object.keys(groupedByPos).map(pos => groupedByPos[pos].length > 0 && (
                                        <div key={pos} className="bg-slate-50 rounded-xl p-3 border border-slate-200">
                                            <h3 className="text-xs font-bold uppercase text-slate-500 mb-2">{pos}</h3>
                                            {getComparisonChart(pos)}
                                        </div>
                                    ))}
                                </div>
                            )} 
                        </div> 
                    </div> 
                    <div className="w-full md:w-80 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-64 md:h-full overflow-hidden"> 
                        {selectedPlayer ? ( <><div className="p-6 flex flex-col items-center border-b bg-slate-50 relative"><div className="absolute top-2 right-2 opacity-80 scale-75 origin-top-right"><RadarChart data={getRadarData(selectedPlayer)} size={100} color={themeColor} /></div><div className="w-20 h-20 rounded-full bg-white border-4 overflow-hidden shadow mb-3 z-10" style={{borderColor: themeColor}}>{selectedPlayer.image ? <img src={selectedPlayer.image} className="w-full h-full object-cover"/> : <div className="flex items-center justify-center h-full text-slate-300"><Icon name="user" size={32}/></div>}</div><h3 className="font-black text-lg text-slate-800 uppercase text-center leading-none z-10">{selectedPlayer.name}</h3><span className="text-xs font-bold text-slate-400 mt-1 z-10">{selectedPlayer.pos}</span><div className="flex gap-2 mt-4 w-full z-10"><div className="flex-1 bg-white p-2 rounded border text-center shadow-sm"><div className="text-[9px] text-slate-400 font-bold uppercase">Média</div><div className="text-xl font-black" style={{color: themeColor}}>{selectedPlayer.avg}</div></div><div className="flex-1 bg-white p-2 rounded border text-center shadow-sm"><div className="text-[9px] text-slate-400 font-bold uppercase">Treinos</div><div className="text-xl font-black text-slate-600">{selectedPlayer.count}</div></div></div></div><div className="flex-1 p-4 bg-white overflow-y-auto"><h4 className="text-[10px] font-bold text-slate-400 uppercase mb-2 flex items-center gap-2"><Icon name="trend"/> Oscilação (Linha Pontilhada = Média)</h4><OscillationChart sessions={selectedPlayer.sessions} avg={selectedPlayer.avg} color={themeColor} /><div className="mt-4"><h4 className="text-[10px] font-bold text-slate-400 uppercase mb-2">Histórico Recente</h4><div className="space-y-1">{selectedPlayer.sessions.slice(-5).reverse().map((s,i) => (<div key={i} className="flex justify-between items-center text-xs border-b border-slate-50 py-1"><span className="text-slate-500">{formatDateBR(s.date)}</span><div className="flex items-center gap-1"><span className={`font-bold ${s.rating>=4?'text-green-600':s.rating<3?'text-red-500':'text-yellow-600'}`}>{s.rating}</span><Icon name="star" size={10} className="text-slate-300"/></div></div>))}</div></div></div></> ) : (<div className="flex-1 flex flex-col items-center justify-center text-slate-300 p-8 text-center"><Icon name="chart" size={48} className="mb-2 opacity-50"/><span className="text-xs font-bold">Selecione um atleta.</span></div>)} 
                    </div> 
                </div> 
            ); 
        };

        const ScoutingView = ({ themeColor, scoutingData, setScoutingData, scoutingHistory, setScoutingHistory }) => { 
            const [toast, setToast] = useState(null); 
            const [showLoad, setShowLoad] = useState(false); 
            const [diagnosis, setDiagnosis] = useState({ title: '', text: '', s: [], w: [] }); 
            const [contextAnalysis, setContextAnalysis] = useState(null);
            
            const data = scoutingData || {};
            const history = Array.isArray(scoutingHistory) ? scoutingHistory : [];

            useEffect(() => { 
                if(!data.system) { setDiagnosis({ title: '', text: '', s: [], w: [] }); return; } 
                const tacticalDB = { 
                    "4-3-3": { text: "Formação agressiva pelos lados. Deixa espaços nas costas dos laterais.", s: ["Amplitude ofensiva", "Pressão alta", "Triangulações laterais"], w: ["Costas dos laterais", "Espaço entre linhas se os médios subirem", "Contra-ataque central"] }, 
                    "4-4-2": { text: "Duas linhas de 4 sólidas. Difícil de penetrar, mas pode perder o meio-campo (2v3).", s: ["Defesa compacta", "Dupla de ataque perigosa", "Coberturas laterais"], w: ["Inferioridade numérica no meio", "Espaço entre a defesa e o meio", "Pouca criatividade central"] }, 
                    "3-5-2": { text: "Povoa o meio-campo. Alas são fundamentais no ataque e defesa.", s: ["Superioridade no meio", "Alas ofensivos", "Defesa com 3 zagueiros"], w: ["Costas dos alas", "Apenas 1 jogador em cada corredor lateral", "Transição lenta"] }, 
                    "4-2-3-1": { text: "Equilibrada. O Camisa 10 é o cérebro. Volantes protegem a zaga.", s: ["Meia central livre (10)", "Laterais apoiam com segurança", "Equilíbrio defensivo"], w: ["Se o 10 for marcado, time trava", "Espaço se os volantes saírem para caça", "Isolamento do atacante"] }, 
                    "5-3-2": { text: "Bloco baixo e contra-ataque. Difícil de fazer gol, perigoso na transição.", s: ["Defesa muito sólida", "Contra-ataque rápido", "Bola aérea defensiva"], w: ["Pouca posse de bola", "Dificuldade em propor jogo", "Dependência dos atacantes"] }, 
                    "3-4-3": { text: "Muito ofensiva. Riscos altos na defesa se a pressão falhar.", s: ["Ataque com 3 homens", "Pressão pós-perda intensa", "Laterais viram alas"], w: ["Defesa exposta nos lados", "Exige físico perfeito", "Espaços enormes nos contra-ataques"] } 
                }; 
                const advice = tacticalDB[data.system] || { text: "Sistema padrão.", s:[], w:[] }; 
                setDiagnosis({ title: data.system, ...advice }); 
            }, [data.system]);
            
            useEffect(() => { 
                const results = data.last5 || [null,null,null,null,null]; 
                const validResults = results.filter(r => r !== null); 
                if(validResults.length === 0) { setContextAnalysis(null); return; } 
                let points = 0; 
                validResults.forEach(r => { if(r==='W') points+=3; if(r==='D') points+=1; }); 
                const maxPoints = validResults.length * 3; 
                const percentage = points / maxPoints; 
                let status = ""; let color = ""; 
                if (percentage >= 0.8) { status = "EM ALTA (Momentum)"; color = "text-green-600"; } 
                else if (percentage >= 0.5) { status = "REGULAR (Oscilando)"; color = "text-yellow-600"; } 
                else { status = "EM BAIXA (Crise)"; color = "text-red-600"; } 
                const isHome = data.isHome; 
                let advice = ""; 
                if (percentage >= 0.8 && isHome) advice = "⚠️ FORTALEZA: Eles estão voando e jogam em casa. Jogue fechado e explore o erro."; 
                else if (percentage >= 0.8 && !isHome) advice = "⚠️ PERIGO: Mesmo fora, eles estão confiantes. Cuidado com o salto alto."; 
                else if (percentage < 0.4 && isHome) advice = "🎯 OPORTUNIDADE: Estão mal, mas a torcida pressiona. Se fizermos o 1º gol, eles desmoronam."; 
                else if (percentage < 0.4 && !isHome) advice = "🎯 PRESA FÁCIL: Estão em crise e longe de casa. Pressione alto desde o início!"; 
                else advice = "Jogo equilibrado. Detalhes definirão o resultado."; 
                setContextAnalysis({ status, color, advice }); 
            }, [data.last5, data.isHome]);
            
            const updateField = (f, v) => setScoutingData({...data, [f]: v}); 
            const updateList = (t, i, v) => { const l = [...(data[t] || Array(4).fill(''))]; l[i] = v; setScoutingData({...data, [t]: l}); }; 
            const updateLast5 = (index, result) => { const current = data.last5 || [null, null, null, null, null]; current[index] = result; setScoutingData({...data, last5: current}); }; 
            const save = () => { const r = { ...data, id: data.id || Date.now() }; const idx = history.findIndex(x => x.id === r.id); const h = [...history]; if(idx >= 0) h[idx] = r; else h.push(r); setScoutingHistory(h); setScoutingData(r); setToast("Salvo!"); setTimeout(()=>setToast(null), 2000); }; 

            const loadReport = (h) => {
                setScoutingData(h);
                setShowLoad(false);
            }
            
            const deleteReport = (id, e) => {
                e.stopPropagation();
                if(window.confirm("Apagar relatório?")) {
                    setScoutingHistory(history.filter(x => x.id !== id));
                }
            }

            return ( 
                <div className="p-4 bg-slate-50 h-full overflow-y-auto animate-fade-in relative"> 
                    {toast && <div className="fixed top-20 left-1/2 -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-xl z-50 toast-enter flex items-center gap-2"><Icon name="check"/> {toast}</div>} 
                    {showLoad && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={()=>setShowLoad(false)}>
                            <div className="bg-white rounded-xl w-full max-w-sm p-4 shadow-2xl" onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="font-bold text-slate-800">Relatórios Salvos</h3>
                                    <button type="button" onClick={()=>setShowLoad(false)}><Icon name="x"/></button>
                                </div>
                                <div className="space-y-2 max-h-64 overflow-y-auto">
                                    {history.length > 0 ? history.map(h => (
                                        <div key={h.id} className="flex justify-between items-center border border-slate-200 p-2 rounded-lg bg-slate-50 cursor-pointer hover:border-blue-500" onClick={()=>loadReport(h)}>
                                            <div>
                                                <div className="font-bold text-sm text-slate-800 uppercase">{h.opponent || 'Sem Nome'}</div>
                                                <div className="text-[10px] text-slate-500 font-bold">{h.date ? formatDateBR(h.date) : 'Sem data'} • {h.system || '-'}</div>
                                            </div>
                                            <button type="button" onClick={(e)=>deleteReport(h.id, e)} className="text-red-400 hover:text-red-600 p-2"><Icon name="trash" size={14}/></button>
                                        </div>
                                    )) : <div className="text-center text-xs text-slate-400 py-4">Nenhum relatório salvo.</div>}
                                </div>
                            </div>
                        </div>
                    )} 
                    
                    <div className="flex justify-between mb-4 no-print"><div className="flex gap-2"><button type="button" onClick={()=>setScoutingData({})} className="bg-white border border-slate-300 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 hover:bg-slate-50 shadow-sm text-slate-700 transition"><Icon name="plus"/> NOVO</button><button type="button" onClick={()=>setShowLoad(true)} className="bg-white border border-slate-300 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1 hover:bg-slate-50 shadow-sm text-slate-700 transition"><Icon name="list"/> GERENCIAR</button></div><button type="button" onClick={save} className="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-700 shadow-lg flex items-center gap-1 transition"><Icon name="save"/> SALVAR</button></div> 
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4"> 
                        <div className="mb-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200"> 
                            <div className="grid grid-cols-2 gap-4"><div><label className="text-[10px] font-bold text-slate-400 uppercase">Adversário</label><input className="w-full border-b-2 border-slate-100 font-black text-xl outline-none bg-transparent focus:border-blue-500 transition text-slate-800 uppercase" placeholder="NOME DO CLUBE" value={data.opponent||''} onChange={e=>updateField('opponent',e.target.value)}/></div> <div><label className="text-[10px] font-bold text-slate-400 uppercase">Sistema Tático</label><select className="w-full border-b-2 border-slate-100 font-bold outline-none bg-transparent py-1 text-blue-600 focus:border-blue-500 transition" value={data.system||''} onChange={e=>updateField('system',e.target.value)}><option value="">Selecione...</option>{tacticalSystems.map(s=><option key={s} value={s}>{s}</option>)}</select></div></div>

                            <div className="mt-6 flex items-center gap-4"><label className="text-[10px] font-bold text-slate-400 uppercase">Mando de Campo:</label><button type="button" onClick={()=>updateField('isHome', !data.isHome)} className={`px-4 py-1.5 rounded-lg text-[10px] font-black transition-colors shadow-sm ${data.isHome ? 'bg-blue-600 text-white' : 'bg-slate-100 border border-slate-200 text-slate-500'}`}>{data.isHome ? 'JOGA EM CASA' : 'JOGA FORA'}</button></div> 
                            <div className="mt-6"><label className="text-[10px] font-bold text-slate-400 uppercase">Escudo (URL)</label><input className="w-full border-b-2 border-slate-100 text-xs font-bold outline-none text-blue-500 bg-transparent focus:border-blue-500 py-1" placeholder="https://..." value={data.logo||''} onChange={e=>updateField('logo',e.target.value)}/></div> 
                        </div> 
                        <div className="space-y-4"> 
                            {diagnosis.title && (

                                    <div className="flex items-start gap-3 relative z-10">

                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className={`${contextAnalysis.status.includes('ALTA') ? 'text-red-500 bg-red-100' : 'text-yellow-600 bg-yellow-100'} p-2 rounded-full shrink-0`}><Icon name="alert" size={20}/></div>
                                    <div>
                                        <div className="text-[10px] font-black opacity-70 uppercase tracking-widest mb-1">MOMENTO DA EQUIPE</div>
                                        <div className={`text-sm font-black uppercase mb-1 ${contextAnalysis.color}`}>{contextAnalysis.status}</div>
                                        <div className="text-xs font-bold text-slate-700 italic">"{contextAnalysis.advice}"</div>
                                    </div>
                                </div>
                            )} 
                        </div> 
                    </div> 
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4 mb-4">
                        <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                            <div className="text-xs font-black text-green-600 uppercase mb-3 flex items-center gap-2"><Icon name="plus" size={14}/> Pontos Fortes (Observados)</div>
                            <div className="space-y-2">
                                {[0,1,2].map(i=><input key={i} className="w-full border-b border-slate-100 text-xs py-1.5 outline-none bg-transparent focus:border-green-400 transition font-medium text-slate-700" placeholder={`Característica forte ${i+1}...`} value={data.strengths?.[i]||''} onChange={e=>updateList('strengths',i,e.target.value)}/>)}
                            </div>
                        </div>
                        <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                            <div className="text-xs font-black text-red-600 uppercase mb-3 flex items-center gap-2"><Icon name="x" size={14}/> Pontos Fracos (Observados)</div>
                            <div className="space-y-2">
                                {[0,1,2].map(i=><input key={i} className="w-full border-b border-slate-100 text-xs py-1.5 outline-none bg-transparent focus:border-red-400 transition font-medium text-slate-700" placeholder={`Vulnerabilidade ${i+1}...`} value={data.weaknesses?.[i]||''} onChange={e=>updateList('weaknesses',i,e.target.value)}/>)}

                    </div> 
                    <div className="space-y-4">
                        {['Organização Ofensiva', 'Organização Defensiva', 'Bolas Paradas'].map((label, i) => {

                                <div key={field} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                    <label className="text-xs font-black text-slate-500 uppercase mb-2 block">{label}</label>
                                    <textarea className="w-full h-24 text-xs p-3 border border-slate-100 bg-slate-50 rounded-lg mt-1 resize-none outline-none focus:border-blue-400 transition font-medium text-slate-700" placeholder={`Análise de ${label.toLowerCase()}...`} value={data[field]||''} onChange={e=>updateField(field,e.target.value)}></textarea>
                                </div>

                </div> 
            ); 
        };

        const PostMatchView = ({ themeColor, matchData, setMatchData, players, setPlayers, matchHistory, setMatchHistory, teamLogo }) => { 
            const [toast, setToast] = useState(null); 
            const [showLoad, setShowLoad] = useState(false); 
            
            const safePlayers = players || [];
            const safeMatchData = matchData || {};
            const safeHistory = Array.isArray(matchHistory) ? matchHistory : [];

            const toggleStarter = (idx) => { const s = safeMatchData.starters||[]; if(s.includes(idx)) setMatchData({...safeMatchData, starters: s.filter(id=>id!==idx)}); else if(s.length<11) setMatchData({...safeMatchData, starters: [...s, idx]}); else alert("Máximo 11 titulares."); }; 
            const addEvent = (type) => { if(safeMatchData.selectedPlayer===undefined||safeMatchData.selectedPlayer==="") return alert("Selecione um jogador."); const p = safePlayers[safeMatchData.selectedPlayer]; setMatchData({...safeMatchData, events: [...(safeMatchData.events||[]), { id: Date.now(), type, player: p.name, playerIdx: safeMatchData.selectedPlayer, time: prompt("Minuto:")||"0'" }]}); }; 
            
            const saveMatch = () => { 
                if(!safeMatchData.opponent) return alert("Digite o adversário"); 
                const r = { ...safeMatchData, id: safeMatchData.id || Date.now() }; 
                const idx = safeHistory.findIndex(x => x.id === r.id); 
                const h = [...safeHistory]; 
                if(idx >= 0) h[idx] = r; else h.push(r); 
                setMatchHistory(h); 
                setMatchData(r); 
                const np = [...safePlayers]; 
                (r.events||[]).forEach(e => { if(e.playerIdx!==undefined && np[e.playerIdx]){ if(!np[e.playerIdx].stats) np[e.playerIdx].stats={g:0,a:0,yc:0,rc:0}; if(e.type==='GOL') np[e.playerIdx].stats.g++; if(e.type==='AMARELO') np[e.playerIdx].stats.yc++; if(e.type==='VERMELHO') np[e.playerIdx].stats.rc++; if(e.type==='LESÃO') np[e.playerIdx].injured=true; } }); 
                setPlayers(np); 
                setToast("Salvo e Atualizado!"); 
                setTimeout(()=>setToast(null), 3000); 
            }; 

            const loadMatch = (h) => {
                setMatchData(h);
                setShowLoad(false);
            };

            return ( 
                <div className="p-4 h-full overflow-y-auto flex flex-col md:flex-row gap-4 animate-fade-in relative"> 
                    {toast && <div className="fixed top-20 left-1/2 -translate-x-1/2 bg-green-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-xl z-50 toast-enter flex items-center gap-2"><Icon name="check"/> {toast}</div>} 
                    {showLoad && <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={()=>setShowLoad(false)}><div className="bg-white rounded-xl w-full max-w-sm p-4" onClick={e=>e.stopPropagation()}><h3 className="font-bold mb-4">Jogos Salvos</h3><div className="space-y-2">{safeHistory.map(h=><div key={h.id} className="flex justify-between border p-2 rounded"><span className="font-bold">{h.opponent} ({h.date})</span><button type="button" onClick={()=>loadMatch(h)} className="text-blue-500">Abrir</button></div>)}</div></div></div>} 
                    
                    <div className="flex-1 space-y-4"> 
                        <div className="flex justify-between mb-2 no-print">
                            <div className="flex gap-2">
                                <button type="button" onClick={()=>setMatchData({})} className="bg-white border px-3 py-1 rounded text-xs font-bold hover:bg-slate-50 shadow-sm"><Icon name="plus"/> NOVO</button>
                                <button type="button" onClick={()=>setShowLoad(true)} className="bg-white border px-3 py-1 rounded text-xs font-bold hover:bg-slate-50 shadow-sm"><Icon name="list"/> GERENCIAR</button>
                            </div>
                            <button type="button" onClick={saveMatch} className="bg-blue-600 text-white px-4 py-1 rounded text-xs font-bold hover:bg-blue-700 shadow">SALVAR & ATUALIZAR</button>
                        </div> 
                        
                        <div className="bg-white p-4 rounded-xl shadow-sm border text-center relative"> 
                            <div className="flex justify-between items-center px-4"><div className="flex flex-col items-center w-24"><div className="w-16 h-16 bg-slate-100 rounded-full border mb-1 flex items-center justify-center overflow-hidden">{teamLogo ? <img src={teamLogo} className="w-full h-full object-contain"/> : <span className="text-[9px]">MEU TIME</span>}</div><input className="w-12 text-center text-3xl font-black border rounded bg-transparent" value={safeMatchData.goalsUs||0} onChange={e=>setMatchData({...safeMatchData, goalsUs:e.target.value})}/></div><div className="text-2xl font-black text-slate-300">X</div><div className="flex flex-col items-center w-24"><div className="w-16 h-16 bg-slate-100 rounded-full border mb-1 flex items-center justify-center overflow-hidden bg-white">{safeMatchData.logo ? <img src={safeMatchData.logo} className="w-full h-full object-contain"/> : <span className="text-[9px] text-slate-400">URL</span>}</div><input className="w-12 text-center text-3xl font-black border rounded bg-transparent" value={safeMatchData.goalsThem||0} onChange={e=>setMatchData({...safeMatchData, goalsThem:e.target.value})}/></div></div> 
                            <div className="mt-4 flex gap-2 justify-center"><input type="date" className="border-b text-xs text-center outline-none font-bold bg-transparent" value={safeMatchData.date||''} onChange={e=>setMatchData({...safeMatchData, date:e.target.value})}/><input className="border-b text-xs text-center outline-none font-bold uppercase bg-transparent" placeholder="NOME DO RIVAL" value={safeMatchData.opponent||''} onChange={e=>setMatchData({...safeMatchData, opponent:e.target.value})}/><input className="border-b text-xs text-center outline-none text-blue-500 w-24 bg-transparent" placeholder="Link Escudo" value={safeMatchData.logo||''} onChange={e=>setMatchData({...safeMatchData, logo:e.target.value})}/></div> 
                        </div> 
                        
                        <div className="bg-white p-4 rounded-xl shadow-sm border">
                            <div className="text-xs font-bold text-slate-400 uppercase mb-2">Escalar 11 Iniciais (Clique)</div>
                            <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto">{safePlayers.map((p, i) => (<div key={i} onClick={()=>toggleStarter(i)} className={`cursor-pointer border rounded-full px-2 py-1 text-[10px] font-bold flex items-center gap-1 ${safeMatchData.starters?.includes(i) ? 'bg-green-500 text-white border-green-600' : 'bg-slate-50 text-slate-500'}`}>{p.image ? <img src={p.image} className="w-4 h-4 rounded-full object-cover"/> : <div className="w-4 h-4 bg-slate-300 rounded-full"></div>}{p.name}</div>))}</div>
                        </div> 
                        
                        <div className="bg-white p-4 rounded-xl shadow-sm border">
                            <div className="text-xs font-bold text-slate-400 uppercase mb-2">Registrar Evento (Selecione Jogador)</div>
                            <div className="grid grid-cols-4 md:grid-cols-6 gap-2 mb-3 max-h-32 overflow-y-auto p-1">{safePlayers.map((p, i) => (<div key={i} onClick={()=>setMatchData({...safeMatchData, selectedPlayer: i})} className={`player-select-card ${safeMatchData.selectedPlayer == i ? 'selected' : ''}`}><div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden mb-1">{p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="user"/>}</div><span className="text-[9px] font-bold truncate w-full text-center">{p.name}</span></div>))}</div>
                            <div className="grid grid-cols-5 gap-2 mt-3"><button type="button" onClick={()=>addEvent('GOL')} className="bg-green-100 text-green-700 p-2 rounded font-bold text-xs hover:bg-green-200 border border-green-200">GOL</button><button type="button" onClick={()=>addEvent('AMARELO')} className="bg-yellow-100 text-yellow-700 p-2 rounded font-bold text-xs hover:bg-yellow-200 border border-yellow-200">AMA</button><button type="button" onClick={()=>addEvent('VERMELHO')} className="bg-red-100 text-red-700 p-2 rounded font-bold text-xs hover:bg-red-200 border border-red-200">VER</button><button type="button" onClick={()=>addEvent('LESÃO')} className="bg-blue-100 text-blue-700 p-2 rounded font-bold text-xs hover:bg-blue-200 border border-blue-200">LES</button><button type="button" onClick={()=>addEvent('SUB')} className="bg-slate-100 text-slate-700 p-2 rounded font-bold text-xs hover:bg-slate-200 border border-slate-300">SUB</button></div>
                        </div> 
                    </div> 
                    
                    {/* NOVA ÁREA DE RELATÓRIO DO PÓS JOGO */}
                    <div className="w-full md:w-80 space-y-4">
                        <div className="bg-white rounded-xl shadow-sm border p-4">
                            <h3 className="text-xs font-bold text-slate-400 uppercase mb-2 flex items-center gap-1"><Icon name="star" size={14}/> Destaque (Craque do Jogo)</h3>
                            <select className="w-full border-b outline-none font-black text-sm text-blue-600 bg-transparent py-1" value={safeMatchData.motm || ''} onChange={e=>setMatchData({...safeMatchData, motm: e.target.value})}>
                                <option value="">Selecione quem foi bem...</option>
                                {safePlayers.map((p,i)=><option key={i} value={p.name}>{p.name}</option>)}
                            </select>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-sm border p-4">
                            <h3 className="text-xs font-bold text-slate-400 uppercase mb-2 flex items-center gap-1"><Icon name="clipboard" size={14}/> Resumo / Feedback Tático</h3>
                            <textarea className="w-full h-40 bg-slate-50 border border-slate-200 rounded p-2 text-xs outline-none resize-none" value={safeMatchData.notes || ''} onChange={e=>setMatchData({...safeMatchData, notes: e.target.value})} placeholder="O que deu certo? Quais erros defensivos corrigir para a próxima semana? Documente aqui o comportamento do time..."></textarea>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-sm border p-4 h-64 overflow-y-auto">
                            <div className="text-xs font-bold text-slate-400 uppercase mb-4 text-center">Timeline do Jogo</div>
                            <div className="space-y-2">{(safeMatchData.events||[]).map((ev, idx) => (<div key={idx} className="flex items-center gap-2 border-b border-slate-50 pb-2 last:border-0"><span className="text-xs font-bold w-6 text-right text-slate-400">{ev.time}</span><span className={`text-[9px] font-bold px-1.5 py-0.5 rounded text-white ${ev.type==='GOL'?'bg-green-500':ev.type==='AMARELO'?'bg-yellow-500':ev.type==='VERMELHO'?'bg-red-500':'bg-slate-400'}`}>{ev.type.substring(0,3)}</span><div className="flex-1 min-w-0"><div className="text-xs font-bold truncate">{ev.player}</div></div><button type="button" onClick={()=>setMatchData({...safeMatchData, events: safeMatchData.events.filter((_,i)=>i!==idx)})} className="text-red-400"><Icon name="trash" size={12}/></button></div>))}</div>
                        </div>
                    </div> 
                </div> 
            ); 
        };

        const MicrocycleView = ({ micro, setMicro, themeColor, calendar }) => { 
            const weekDays = ['SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO', 'DOMINGO']; 
            const [activeSelection, setActiveSelection] = useState(null); 
            const [aiTip, setAiTip] = useState(null); 
            const safeMicro = micro || {};

            const updateDay = (day, f, v) => { const n = {...safeMicro}; if(!n[day]) n[day]={blocks:[], mdTag: '-'}; n[day][f]=v; setMicro(n); }; 
            const addBlock = (tag) => { const { day, period } = activeSelection; const n = {...safeMicro}; if(!n[day]) n[day]={blocks:[], mdTag: '-'}; n[day].blocks.push({...tag, period}); setMicro(n); setActiveSelection(null); }; 
            const removeBlock = (day, idx) => { const n = {...safeMicro}; n[day].blocks.splice(idx,1); setMicro(n); }; 
            
            const handleAiTip = (mdTag) => {
                const tips = {
                    "MD-5 (Recup.)": "🟢 Intensidade Baixa. Foco em recuperar a musculatura após o último jogo. Rondo suave, corrida leve e liberação.",
                    "MD-4 (Força)": "🔴 Força/Tensão máxima! Espaços reduzidos (Pequeno), 3v3 a 5v5. Acelerações, frenagens e duelos intensos.",
                    "MD-3 (Resist.)": "🟠 Resistência Tática. Espaços grandes (Médio/Grande), 7v7 a 10v10. Trabalhar o modelo de jogo com bola longa.",
                    "MD-2 (Velocid.)": "⚡ Velocidade e Reação. Espaços médios, transições rápidas e finalizações sem contato físico prolongado.",
                    "MD-1 (Ativação)": "🟡 Volume muito baixo. Foco mental: bolas paradas, 11x0 (sombra) e ativação rápida do SNC.",
                    "MD (JOGO)": "⚽ DIA DE COMPETIÇÃO. Foco, preleção e aquecimento neuromuscular.",
                    "MD+1 (Recup.)": "🟢 Titulares: Recuperação ativa. Reservas: Treino compensatório de força/resistência.",
                    "MD+2 (Folga)": "⚪ Off físico e mental total."
                };
                setAiTip({ tag: mdTag, text: tips[mdTag] || "Selecione um MD para ver a sugestão da IA." });
            };

            return ( 
                <div className="p-4 bg-slate-50 h-full overflow-x-auto relative animate-fade-in">
                    {aiTip && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 no-print" onClick={()=>setAiTip(null)}>
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl relative" onClick={e=>e.stopPropagation()}>
                                <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-blue-600 text-white p-3 rounded-full shadow-lg border-4 border-white"><Icon name="bot" size={24}/></div>
                                <h3 className="font-black text-center text-slate-800 mt-4 mb-2 text-lg">Assistente IA</h3>
                                <p className="text-center font-bold text-blue-600 text-xs uppercase mb-4 bg-blue-50 py-1 rounded">{aiTip.tag}</p>
                                <p className="text-sm text-slate-600 font-medium text-center leading-relaxed">{aiTip.text}</p>
                                <button type="button" onClick={()=>setAiTip(null)} className="w-full mt-6 bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-700 transition">ENTENDIDO</button>
                            </div>
                        </div>
                    )}

                    <div className="flex gap-4 min-w-[1400px]"> 
                        {activeSelection && ( <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={()=>setActiveSelection(null)}> <div className="bg-white rounded-xl shadow-xl p-4 w-72 max-h-[80vh] overflow-y-auto" onClick={e=>e.stopPropagation()}> <h3 className="font-bold text-center mb-4 text-slate-700">Adicionar Bloco</h3> <div className="text-[10px] font-bold text-slate-400 uppercase mb-2">Geral</div> <div className="grid grid-cols-2 gap-2 mb-4"> {PREDEFINED_TAGS.map(t=><button type="button" key={t.label} onClick={()=>addBlock(t)} className={`${t.color} text-white font-bold py-2 rounded shadow-sm hover:opacity-90 text-[10px]`}>{t.label}</button>)} </div> <div className="text-[10px] font-bold text-slate-400 uppercase mb-2">Tático / Físico</div> <div className="grid grid-cols-2 gap-2"> {TACTICAL_TAGS.map(t=><button type="button" key={t.label} onClick={()=>addBlock(t)} className={`${t.color} text-white font-bold py-2 rounded shadow-sm hover:opacity-90 text-[10px]`}>{t.label}</button>)} </div> </div> </div> )} 
                        
                        {weekDays.map(day => { 
                            const d = safeMicro[day] || {blocks:[], mdTag: '-'}; 
                            const calEvents = (d.date && (calendar||{})[d.date]) ? (calendar||{})[d.date] : []; 
                            return ( 
                                <div key={day} className="w-52 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-full shrink-0"> 
                                    <div className="p-2 text-center text-white font-bold text-xs rounded-t-xl uppercase flex flex-col items-center relative" style={{backgroundColor: themeColor}}>
                                        {day}
