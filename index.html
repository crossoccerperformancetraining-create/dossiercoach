                        </div>
                    </div>
                    <div className="w-full md:w-80 border-t md:border-t-0 md:border-l border-slate-200 bg-white flex flex-col h-64 md:h-full shadow-lg z-20 no-print"><div className="p-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center"><div><div className="text-xs font-bold text-slate-400 uppercase">Nota Média</div><div className="text-2xl font-black flex items-center gap-1" style={{color: themeColor}}>{sessionAvg} <Icon name="star" size={18}/></div></div><div className="text-xs font-bold text-right text-slate-400">JOGADORES<br/>DISPONÍVEIS</div></div><div className="flex-1 overflow-y-auto p-2 space-y-2 bg-slate-100">{safePlayers.filter(p=>!p.injured).map((p,i)=>(<div key={i} className="flex flex-col p-2 rounded border bg-white shadow-sm"><div className="flex items-center gap-2 mb-1"><div className="w-6 h-6 rounded-full bg-slate-200 overflow-hidden relative shrink-0">{p.image?<img src={p.image} className="w-full h-full object-cover"/>:<Icon name="users" size={10}/>}</div><div className="flex-1 min-w-0 font-bold text-xs text-slate-700 uppercase truncate">{p.name}</div>
                    <input type="checkbox" className="ml-auto w-4 h-4 cursor-pointer accent-green-600" title="Presença" defaultChecked={true}/>
                    </div><div className="flex justify-center"><StarRating value={localRatings[i]||0} onChange={v=>handleRatingChange(i,v)}/></div></div>))}</div></div>
                </div>
            );
        };

        const LibraryView = ({ libraryDrills, setLibraryDrills, onAddToSession, onAddToBoard, themeColor }) => { 
            const [toast, setToast] = useState(null); 
            const [showDaySelector, setShowDaySelector] = useState(null); 
            const safeLibrary = libraryDrills || [];

            const handleAdd = (item) => { onAddToSession(item); setToast(`Adicionado à Sessão!`); setTimeout(() => setToast(null), 2000); }; 
            const handleBoardClick = (item) => { setShowDaySelector(item); }; 
            const confirmBoardAdd = (day) => { if(showDaySelector && showDaySelector.image) { onAddToBoard(day, showDaySelector.image); setShowDaySelector(null); setToast(`Adicionado ao Board de ${day}!`); setTimeout(() => setToast(null), 2000); } else { alert("Este exercício não tem imagem."); setShowDaySelector(null); } }; 
            const handleImageUrl = (id) => { const url = prompt("Link da imagem:"); if(url) { const n=safeLibrary.map(i=>i.libId===id?{...i,image:url}:i);setLibraryDrills(n); } }; 
            const addNew = () => setLibraryDrills([...safeLibrary, { libId: Date.now(), name: 'Novo Exercício', method: 'Treino Tático', dim: '-', time: '10', desc: '', variants: '', image: null, linkUrl: '' }]); 
            const updateLib = (id, f, v) => setLibraryDrills(safeLibrary.map(i=>i.libId===id?{...i,[f]:v}:i)); 
            const deleteLib = (id) => { if(window.confirm('Apagar exercício?')) setLibraryDrills(safeLibrary.filter(i=>i.libId!==id)); }; 
            return ( <div className="p-6 bg-slate-100 h-full overflow-y-auto relative"> {toast && <div className="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-full text-xs font-bold shadow-xl toast-enter z-50 flex items-center gap-2 no-print"><Icon name="check"/> {toast}</div>} {showDaySelector && ( <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4" onClick={()=>setShowDaySelector(null)}> <div className="bg-white rounded-xl p-4 w-72 shadow-2xl animate-fade-in" onClick={e=>e.stopPropagation()}> <h3 className="font-bold text-center mb-4 text-slate-700 text-xs uppercase">Adicionar ao Board</h3> <div className="grid grid-cols-2 gap-2"> {['SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO','DOMINGO'].map(day => ( <button type="button" key={day} onClick={()=>confirmBoardAdd(day)} className="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded text-[10px] border border-slate-200">{day}</button> ))} </div> <button type="button" onClick={()=>setShowDaySelector(null)} className="mt-4 w-full text-xs text-red-400 font-bold">Cancelar</button> </div> </div> )} <div className="flex justify-between items-center mb-6 border-b border-slate-200 pb-4 no-print"><h2 className="text-2xl font-bold flex items-center gap-2" style={{color: themeColor}}><Icon name="book" size={24}/> Biblioteca</h2><button type="button" onClick={addNew} className="text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg hover:opacity-90 transition flex items-center gap-2" style={{backgroundColor: themeColor}}><Icon name="plus" size={16}/> NOVO</button></div> <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">{safeLibrary.map((item) => (<div key={item.libId} className="print-card bg-white rounded-xl shadow border border-slate-200 overflow-hidden group hover:shadow-xl transition-all duration-300"><div className="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50"><input className="font-bold text-slate-800 text-sm bg-transparent outline-none w-2/3" value={item.name} onChange={(e)=>updateLib(item.libId, 'name', e.target.value)} /><button type="button" onClick={()=>deleteLib(item.libId)} className="text-slate-300 hover:text-red-500 no-print"><Icon name="trash" size={14}/></button></div><div className="h-48 bg-slate-100 relative group/img border-b border-slate-100 flex items-center justify-center cursor-pointer"> {item.image ? <img src={item.image} onError={(e)=>{e.target.src='https://placehold.co/400x300?text=Sem+Imagem';}} className="w-full h-full object-cover" /> : <div className="text-slate-400 flex flex-col items-center"><Icon name="image" size={32}/><span className="text-xs">Sem Imagem</span></div>} <div className="absolute inset-0 bg-black/60 flex flex-col items-center justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity no-print"> <button type="button" onClick={() => handleAdd(item)} className="bg-white text-slate-800 px-4 py-1.5 rounded-full font-bold text-[10px] hover:bg-green-100 flex items-center gap-1 shadow">+ SESSÃO</button> <button type="button" onClick={() => handleBoardClick(item)} className="bg-white text-slate-800 px-4 py-1.5 rounded-full font-bold text-[10px] hover:bg-blue-100 flex items-center gap-1 shadow">+ BOARD</button> </div> <button type="button" className="absolute top-2 right-2 bg-white p-2 rounded-full shadow cursor-pointer hover:bg-blue-50 z-10 no-print" title="Link da Imagem" onClick={(e)=>{e.stopPropagation(); handleImageUrl(item.libId);}}><Icon name="link" size={16} color={themeColor} /></button> </div><div className="p-3 bg-white flex flex-col gap-2"><textarea className="text-xs text-slate-500 w-full h-10 resize-none outline-none bg-transparent border-b border-slate-100" value={item.desc} onChange={(e)=>updateLib(item.libId, 'desc', e.target.value)} placeholder="Descrição rápida..."/><div className="flex items-center gap-2 mt-1 bg-slate-50 p-2 rounded border border-slate-100 no-print"><Icon name="link" size={16} className="text-red-500"/><input className="text-xs w-full bg-transparent outline-none font-bold" placeholder="Link (YouTube, Video)..." value={item.linkUrl || ''} onChange={(e)=>updateLib(item.libId, 'linkUrl', e.target.value)} />{(item.linkUrl||'').length > 0 && <a href={(item.linkUrl||'').startsWith('http') ? item.linkUrl : `https://${item.linkUrl}`} target="_blank" className="text-[10px] bg-red-500 text-white px-2 py-1 rounded font-bold hover:bg-red-600 shadow-sm">VER</a>}</div></div></div>))}</div> </div> ); 
        };

        // --- APP PRINCIPAL E ROTEAMENTO ---
        const MainApp = () => {
            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);

            useEffect(() => {
                const el = document.getElementById('loading');
                const unsubscribe = firebase.auth().onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setLoadingAuth(false);
                    if(el) el.style.display = 'none';
                });
                return () => unsubscribe();
            }, []);

            if (loadingAuth) return null;
            if (!user) return <LoginScreen themeColor="#1e3a8a" />;
            return <ProCoachApp user={user} />;
        };

        const ProCoachApp = ({ user }) => {
            const [tab, setTab] = useState('dashboard');
            
            const [themeColor, setThemeColor] = useFirebaseStorage('pc_theme', '#1e3a8a');
            const [header, setHeader] = useFirebaseStorage('pc_header', { local: 'CT', time: '09:00', dur: '90' });
            const [teamName, setTeamName] = useFirebaseStorage('pc_team_name', 'MINHA EQUIPE');
            const [teamLogo, setTeamLogo] = useFirebaseStorage('pc_team_logo_url', null);
            
            const [players, setPlayers] = useFirebaseStorage('pc_players', [{name: "Jogador", pos: 'Zagueiro', foot: 'Destro', stats: {}}]);
            const [sessionHistory, setSessionHistory] = useFirebaseStorage('pc_history_v2', {});
            const [scoutingData, setScoutingData] = useFirebaseStorage('pc_scouting', {});
            const [scoutingHistory, setScoutingHistory] = useFirebaseStorage('pc_scouting_history', []);
            const [matchData, setMatchData] = useFirebaseStorage('pc_match_report', {});
            const [matchHistory, setMatchHistory] = useFirebaseStorage('pc_match_history', []);
            const [sessionDate, setSessionDate] = useState(new Date().toISOString().split('T')[0]);
            const [sessionDrills, setSessionDrills] = useState([]);
            const [libraryDrills, setLibraryDrills] = useFirebaseStorage('pc_library', []);
            const [microData, setMicroData] = useFirebaseStorage('pc_micro_v7', {});
            const [calendarData, setCalendarData] = useFirebaseStorage('pc_calendar_v7', {});
            const [showSettings, setShowSettings] = useState(false);
            const [boardWeekDate, setBoardWeekDate] = useState(new Date()); 
            const [boardHistory, setBoardHistory] = useFirebaseStorage('pc_board_history_final', {}); 
            const [notices, setNotices] = useFirebaseStorage('pc_notices_list', []);
            const [seasonStats, setSeasonStats] = useFirebaseStorage('pc_season_stats_v2', { league: { p:0, w:0, d:0, l:0, gf:0, ga:0 }, cup: { p:0, w:0, d:0, l:0, gf:0, ga:0 }, friendly: { p:0, w:0, d:0, l:0, gf:0, ga:0 } }); 
            const [showStatsModal, setShowStatsModal] = useState(false);
            const [showAlertsModal, setShowAlertsModal] = useState(false);
            const [isDarkMode, setIsDarkMode] = useFirebaseStorage('pc_dark_mode', false);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark-theme');
                else document.documentElement.classList.remove('dark-theme');
            }, [isDarkMode]);

            const performanceAlerts = useMemo(() => {
                const safeHistory = sessionHistory || {};
                const safePlayers = players || [];
                if (Object.keys(safeHistory).length === 0 || safePlayers.length === 0) return [];
                
                const sortedDates = Object.keys(safeHistory).sort((a,b) => new Date(b) - new Date(a));
                const recentDates = sortedDates.slice(0, 3);
                const newAlerts = [];
                
                safePlayers.forEach((p, idx) => {
                    if(p.injured) return;
                    let recentRatings = [];
                    let missed = 0;
                    recentDates.forEach(date => {
                        const session = safeHistory[date];
                        if (session && session.ratings && session.ratings[idx] !== undefined) recentRatings.push(session.ratings[idx]);
                        else missed++;
                    });
                    if (missed >= 2 && recentDates.length >= 2) newAlerts.push({ type: 'absence', player: p.name, msg: `Sem nota em ${missed} das últimas ${recentDates.length} sessões.` });
                    if (recentRatings.length > 0) {
                        const avg = recentRatings.reduce((a,b)=>a+b,0) / recentRatings.length;
                        if (avg < 3.0) newAlerts.push({ type: 'performance', player: p.name, msg: `Média de ${avg.toFixed(1)} nas últimas sessões (Baixa).` });
                    }
                });
                return newAlerts;
            }, [players, sessionHistory]);

            const getWeekKey = (d) => { const date = new Date(d); date.setHours(0,0,0,0); date.setDate(date.getDate() + 4 - (date.getDay() || 7)); const yearStart = new Date(date.getFullYear(), 0, 1); const weekNo = Math.ceil((((date - yearStart) / 86400000) + 1) / 7); return `${date.getFullYear()}-W${weekNo}`; };
            const currentWeekKey = getWeekKey(boardWeekDate);
            const safeBoardHistory = boardHistory || {};
            const currentBoardData = safeBoardHistory[currentWeekKey] || {};
            const updateBoardData = (day, images, mdTag) => { const newData = { ...currentBoardData, [day]: {images, mdTag} }; setBoardHistory({ ...safeBoardHistory, [currentWeekKey]: newData }); };
            const changeBoardWeek = (days) => { const newDate = new Date(boardWeekDate); newDate.setDate(newDate.getDate() + days); setBoardWeekDate(newDate); };
            
            return (
                <div className="flex flex-col h-full bg-slate-100 relative pt-6">
                    <div className="absolute top-0 w-full z-50"><NetworkStatus /></div>
                    <SettingsModal show={showSettings} onClose={()=>setShowSettings(false)} themeColor={themeColor} setThemeColor={setThemeColor} teamLogo={teamLogo} setTeamLogo={setTeamLogo} teamName={teamName} setTeamName={setTeamName} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />
                    <SeasonStatsModal show={showStatsModal} onClose={()=>setShowStatsModal(false)} stats={seasonStats} setStats={setSeasonStats} themeColor={themeColor} />
                    <AlertsModal show={showAlertsModal} onClose={()=>setShowAlertsModal(false)} alerts={performanceAlerts} themeColor={themeColor} />
                    
                    <div className="bg-white border-b p-2 px-4 flex justify-between items-center shadow-sm z-30 shrink-0">
                        <div className="flex items-center gap-4">
                            {teamLogo && <img src={teamLogo} className="w-10 h-10 object-contain" />}
                            <div className="font-black text-xl italic text-slate-800"><span style={{color: themeColor}}>{teamName}</span> <span className="text-[9px] not-italic bg-purple-600 text-white px-1.5 py-0.5 rounded ml-1 font-bold">CLOUD</span></div>
                        </div>
                        <div className="flex gap-2 items-center"> 
                            <div className="relative">
                                <button type="button" onClick={()=>setShowAlertsModal(true)} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print transition" title="Radar de Desempenho"><Icon name="bell" size={20}/>{(performanceAlerts||[]).length > 0 && <span className="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border border-white rounded-full animate-pulse"></span>}</button>
                            </div>
                            <button type="button" onClick={()=>setIsDarkMode(!isDarkMode)} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print transition" title="Alternar Modo Escuro">{isDarkMode ? <Icon name="sun" size={20}/> : <Icon name="moon" size={20}/>}</button>
                            <button type="button" onClick={()=>window.print()} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print transition" title="Imprimir Rápido"><Icon name="printer" size={20}/></button> 
                            <button type="button" onClick={()=>setShowSettings(true)} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print transition" title="Configurações"><Icon name="settings" size={20}/></button> 
                        </div>
                    </div>

                    <div className="flex bg-slate-100 p-1 rounded-lg gap-1 overflow-x-auto shadow-inner no-print shrink-0">
                        <button type="button" onClick={()=>setTab('dashboard')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='dashboard'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='dashboard'?{backgroundColor: themeColor}:{}}><Icon name="home"/> INÍCIO</button>
                        <button type="button" onClick={()=>setTab('squad')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='squad'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='squad'?{backgroundColor: themeColor}:{}}><Icon name="users"/> PLANTEL</button>
                        <button type="button" onClick={()=>setTab('lineup')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='lineup'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='lineup'?{backgroundColor: themeColor}:{}}><Icon name="shirt"/> ESCALAÇÃO</button>
                        <button type="button" onClick={()=>setTab('performance')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='performance'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='performance'?{backgroundColor: themeColor}:{}}><Icon name="chart"/> PERFORMANCE</button>
                        <button type="button" onClick={()=>setTab('scouting')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='scouting'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='scouting'?{backgroundColor: themeColor}:{}}><Icon name="eye"/> SCOUTING</button>
                        <button type="button" onClick={()=>setTab('session')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='session'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='session'?{backgroundColor: themeColor}:{}}><Icon name="list"/> SESSÃO</button>
                        <button type="button" onClick={()=>setTab('postmatch')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='postmatch'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='postmatch'?{backgroundColor: themeColor}:{}}><Icon name="whistle"/> PÓS-JOGO</button>
                        <button type="button" onClick={()=>setTab('micro')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='micro'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='micro'?{backgroundColor: themeColor}:{}}><Icon name="grid"/> MICRO</button>
                        <button type="button" onClick={()=>setTab('board')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='board'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='board'?{backgroundColor: themeColor}:{}}><Icon name="image"/> BOARD</button> 
                        <button type="button" onClick={()=>setTab('calendar')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='calendar'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='calendar'?{backgroundColor: themeColor}:{}}><Icon name="calendar"/> CALEND</button>
                        <button type="button" onClick={()=>setTab('library')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='library'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='library'?{backgroundColor: themeColor}:{}}><Icon name="book"/> BIBLIOTECA</button>
                    </div>

                    <div className="flex-1 overflow-hidden relative">
                        {tab === 'dashboard' && <DashboardView themeColor={themeColor} players={players} matchHistory={matchHistory} setTab={setTab} teamLogo={teamLogo} scoutingData={scoutingData} microData={microData} calendarData={calendarData} header={header} seasonStats={seasonStats} openStats={()=>setShowStatsModal(true)} notices={notices} setNotices={setNotices} />}
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} history={sessionHistory} />}
                        {tab === 'lineup' && <SmartLineupView players={players} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'performance' && <PerformanceView players={players} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'scouting' && <ScoutingView themeColor={themeColor} scoutingData={scoutingData} setScoutingData={setScoutingData} scoutingHistory={scoutingHistory} setScoutingHistory={setScoutingHistory} />}
                        {tab === 'session' && <SessionView drills={sessionDrills} setDrills={setSessionDrills} header={header} setHeader={setHeader} logo={teamLogo} themeColor={themeColor} players={players} history={sessionHistory} setHistory={setSessionHistory} sessionDate={sessionDate} setSessionDate={setSessionDate} teamName={teamName} libraryDrills={libraryDrills} />}
                        {tab === 'postmatch' && <PostMatchView themeColor={themeColor} matchData={matchData} setMatchData={setMatchData} players={players} setPlayers={setPlayers} matchHistory={matchHistory} setMatchHistory={setMatchHistory} teamLogo={teamLogo} />}
                        {tab === 'micro' && <MicrocycleView micro={microData} setMicro={setMicroData} themeColor={themeColor} calendar={calendarData} />}
                        {tab === 'board' && <VisualBoardView currentWeekStart={getMonday(boardWeekDate)} changeWeek={(d)=>{const n=new Date(boardWeekDate); n.setDate(n.getDate()+d); setBoardWeekDate(n);}} boardData={currentBoardData} updateBoardData={updateBoardData} themeColor={themeColor} />}
                        {tab === 'calendar' && <CalendarView calendar={calendarData} setCalendar={setCalendarData} themeColor={themeColor} notices={notices} />}
                        {tab === 'library' && <LibraryView libraryDrills={libraryDrills} setLibraryDrills={setLibraryDrills} onAddToSession={(item)=>{setSessionDrills([...(sessionDrills||[]), {...item, id:Date.now()}]); alert("Enviado para a Sessão Atual!");}} onAddToBoard={()=>{}} themeColor={themeColor} />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
