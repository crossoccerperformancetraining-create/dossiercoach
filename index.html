<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach V2106 - Cloud Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDoS1YJM7etljp__bFp8on52E3qsSUob4Y",
        authDomain: "dossiercoach.firebaseapp.com",
        projectId: "dossiercoach",
        storageBucket: "dossiercoach.firebasestorage.app",
        messagingSenderId: "876303911614",
        appId: "1:876303911614:web:be19c809e8a7e42313ecef"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      const auth = firebase.auth();
    </script>

    <style>
        body { overscroll-behavior-y: contain; touch-action: none; background-color: #f1f5f9; color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: background 0.3s ease; }
        .glass-input { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 2px 4px; color: white; outline: none; width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; font-size: 11px; }
        .print-card { @apply bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden; transition: all 0.3s ease; }
        .grass-pattern { background-color: #15803d; background-image: repeating-linear-gradient(0deg, transparent, transparent 10%, rgba(255,255,255,0.1) 10%, rgba(255,255,255,0.1) 11%); }
        .micro-tag { @apply px-2 py-1.5 rounded text-[10px] font-bold text-white mb-1 cursor-pointer hover:opacity-90 text-center shadow-sm w-full block border border-white/20; }
        
        #loading { position: fixed; inset: 0; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 10px; }
        
        /* BARRA VERDE PADRÃO DO PROFESSOR */
        .status-bar { background-color: #22c55e; color: white; text-align: center; font-size: 10px; font-weight: 800; padding: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .status-bar.offline { background-color: #ef4444; }

        /* ====== TEMA MODO DARK SEGURO ====== */
        body.dark-theme { background-color: #0f172a; color: #f8fafc; }
        .dark-theme .bg-white { background-color: #1e293b !important; border-color: #334155 !important; color: #f8fafc !important; }
        .dark-theme .bg-slate-50, .dark-theme .bg-slate-100 { background-color: #0f172a !important; border-color: #1e293b !important; color: #cbd5e1 !important; }
        .dark-theme .text-slate-800, .dark-theme .text-slate-700, .dark-theme .text-slate-500 { color: #f8fafc !important; }
        .dark-theme input, .dark-theme select, .dark-theme textarea { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; }
        .dark-theme .border-slate-200 { border-color: #334155 !important; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col">
    
    <div id="loading">
        <div class="text-3xl font-black italic">PROCOACH V2106</div>
        <div class="text-sm opacity-70">Acessando Banco de Dados...</div>
    </div>

    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- HOOK DE SINCRONIZAÇÃO ---
        const useFirebaseStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });

            useEffect(() => {
                const user = auth.currentUser;
                if (user) {
                    db.collection('users').doc(user.uid).collection('data').doc(key).get().then(doc => {
                        if (doc.exists) setStoredValue(JSON.parse(doc.data().value));
                    });
                }
            }, [key]);

            useEffect(() => {
                const str = JSON.stringify(storedValue);
                window.localStorage.setItem(key, str);
                const user = auth.currentUser;
                if (user) {
                    db.collection('users').doc(user.uid).collection('data').doc(key).set({ value: str }, { merge: true });
                }
            }, [key, storedValue]);

            return [storedValue, setStoredValue];
        };

        // --- ICONES ORIGINAIS ---
        const Icon = ({ name, size=18, className="" }) => {
            const icons = {
                home: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
                users: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                shirt: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.38 3.4a1.6 1.6 0 0 0-1.6-1.6H5.22a1.6 1.6 0 0 0-1.6 1.6l-1.6 6.3a1.6 1.6 0 0 0 1.2 1.9l2.78.6v9.1a1.6 1.6 0 0 0 1.6 1.6h8.8a1.6 1.6 0 0 0 1.6-1.6v-9.1l2.78-.6a1.6 1.6 0 0 0 1.2-1.9l-1.6-6.3z"/></svg>,
                chart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
                eye: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
                list: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/></svg>,
                whistle: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 21l18 0"/><path d="M3 10a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v10a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2z"/></svg>,
                grid: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
                image: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
                calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
                book: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
                moon: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
                sun: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>,
                check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
                trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
            };
            return <span className={className}>{icons[name] || null}</span>;
        };

        // --- COMPONENTE DE LOGIN ---
        const Login = () => {
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const handleLogin = (e) => {
                e.preventDefault();
                auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Credenciais Inválidas"));
            };
            return (
                <div className="h-full w-full flex items-center justify-center bg-slate-900">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
                        <div className="text-center mb-8"><div className="text-2xl font-black italic uppercase">PROCOACH <span className="text-blue-600">V2106</span></div></div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" placeholder="E-mail" className="w-full border p-3 rounded-xl outline-none" onChange={e=>setEmail(e.target.value)} />
                            <input type="password" placeholder="Senha" className="w-full border p-3 rounded-xl outline-none" onChange={e=>setPass(e.target.value)} />
                            <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">ACESSAR SISTEMA</button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- APP PRINCIPAL ---
        const App = ({ user }) => {
            const [tab, setTab] = useState('dashboard');
            const [isDarkMode, setIsDarkMode] = useFirebaseStorage('pc_dark_mode', false);
            const [themeColor, setThemeColor] = useFirebaseStorage('pc_theme', '#1e3a8a');
            const [teamName, setTeamName] = useFirebaseStorage('pc_team_name', 'AC NOVA GERAÇÃO');
            const [players, setPlayers] = useFirebaseStorage('pc_players', []);
            const [sessionHistory, setSessionHistory] = useFirebaseStorage('pc_history_v2', {});
            const [sessionDate, setSessionDate] = useState(new Date().toISOString().split('T')[0]);
            const [libraryDrills, setLibraryDrills] = useFirebaseStorage('pc_library', []);
            const [isOnline, setIsOnline] = useState(navigator.onLine);

            // Sincronizar com navegador
            useEffect(() => {
                const update = () => setIsOnline(navigator.onLine);
                window.addEventListener('online', update); window.addEventListener('offline', update);
                return () => { window.removeEventListener('online', update); window.removeEventListener('offline', update); };
            }, []);

            // Efeito Dark Mode
            useEffect(() => {
                if (isDarkMode) document.body.classList.add('dark-theme');
                else document.body.classList.remove('dark-theme');
            }, [isDarkMode]);

            // CORREÇÃO: Enviar da Biblioteca para a Sessão
            const handleAddToSession = (item) => {
                const newDrill = { ...item, id: Date.now() };
                const currentData = sessionHistory[sessionDate] || { drills: [] };
                const updatedDrills = [...(currentData.drills || []), newDrill];
                setSessionHistory({
                    ...sessionHistory,
                    [sessionDate]: { ...currentData, drills: updatedDrills }
                });
                alert("Exercício adicionado à sessão de " + formatDateBR(sessionDate));
            };

            return (
                <div className="flex flex-col h-full overflow-hidden">
                    {/* Barra Verde original do Professor */}
                    <div className={`status-bar no-print ${!isOnline ? 'offline' : ''}`}>
                        {isOnline ? 'SISTEMA ONLINE (CONECTADO)' : 'SISTEMA OFFLINE'}
                    </div>

                    {/* Header Padrão original (FOTO 5) */}
                    <div className="bg-white border-b p-2 px-4 flex justify-between items-center z-30 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-slate-800 rounded flex items-center justify-center text-white font-bold text-xs">AC</div>
                            <div className="font-black text-lg italic text-slate-800 uppercase tracking-tighter">
                                {teamName} <span className="bg-purple-600 text-white text-[9px] px-1 rounded not-italic">V2106</span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                             <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 text-slate-400 hover:text-blue-500">
                                <Icon name={isDarkMode ? "sun" : "moon"}/>
                             </button>
                             <button onClick={() => auth.signOut()} className="p-2 text-slate-400 hover:text-red-500">
                                <Icon name="trash" size={14}/>
                             </button>
                        </div>
                    </div>

                    {/* Menu Cinza original (FOTO 5) */}
                    <div className="flex bg-slate-100 p-1 gap-1 overflow-x-auto no-print shrink-0 border-b">
                        {[
                            {id:'dashboard', label:'INÍCIO', icon:'home'},
                            {id:'squad', label:'PLANTEL', icon:'users'},
                            {id:'lineup', label:'ESCALAÇÃO', icon:'shirt'},
                            {id:'performance', label:'PERFORMANCE', icon:'chart'},
                            {id:'scouting', label:'SCOUTING', icon:'eye'},
                            {id:'session', label:'SESSÃO', icon:'list'},
                            {id:'postmatch', label:'PÓS-JOGO', icon:'whistle'},
                            {id:'micro', label:'MICRO', icon:'grid'},
                            {id:'board', label:'BOARD', icon:'image'},
                            {id:'calendar', label:'CALEND', icon:'calendar'},
                            {id:'library', label:'BIBLIOTECA', icon:'book'}
                        ].map(m => (
                            <button key={m.id} onClick={()=>setTab(m.id)} className={`flex-1 flex flex-col items-center py-2 px-3 rounded transition-all min-w-[75px] ${tab===m.id ? 'bg-white shadow text-blue-600 font-bold' : 'text-slate-400 hover:bg-slate-200'}`}>
                                <Icon name={m.icon} size={16} />
                                <span className="text-[9px] mt-1">{m.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Conteúdo (Sua engenharia intacta) */}
                    <div className="flex-1 overflow-hidden relative">
                        {tab === 'library' && (
                            <div className="p-6 bg-slate-50 h-full overflow-y-auto">
                                <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon name="book"/> Biblioteca Tática</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {libraryDrills.map(drill => (
                                        <div key={drill.libId} className="bg-white rounded-xl shadow border p-4 group">
                                            <div className="h-40 bg-slate-100 rounded mb-3 overflow-hidden flex items-center justify-center relative">
                                                {drill.image ? <img src={drill.image} className="w-full h-full object-cover" /> : <Icon name="image" size={32} className="text-slate-300"/>}
                                                <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-all">
                                                    <button onClick={() => handleAddToSession(drill)} className="bg-white text-slate-800 px-4 py-2 rounded-full font-bold text-[10px] shadow">+ ADD SESSÃO</button>
                                                </div>
                                            </div>
                                            <h3 className="font-bold text-sm uppercase">{drill.name}</h3>
                                            <p className="text-[10px] text-slate-500 mt-1 line-clamp-2">{drill.desc}</p>
                                        </div>
                                    ))}
                                    <button onClick={()=>setLibraryDrills([...libraryDrills, {libId: Date.now(), name: 'Novo Exercício', desc: '', image: null}])} className="border-2 border-dashed rounded-xl h-60 flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 hover:border-blue-500">
                                        <Icon name="plus" size={32}/>
                                        <span className="text-xs font-bold mt-2">NOVO NA BIBLIOTECA</span>
                                    </button>
                                </div>
                            </div>
                        )}
                        
                        {tab === 'session' && (
                            <div className="p-4 h-full overflow-y-auto bg-slate-100">
                                <div className="flex justify-between items-center mb-4 bg-white p-3 rounded-xl shadow-sm border">
                                    <div className="flex items-center gap-2">
                                        <span className="text-xs font-bold text-slate-400">DATA DO TREINO:</span>
                                        <input type="date" value={sessionDate} onChange={e=>setSessionDate(e.target.value)} className="border rounded px-2 py-1 text-sm font-bold" />
                                    </div>
                                    <button onClick={()=>{alert("Treino Salvo na Nuvem!")}} className="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase shadow-lg">Salvar Treino</button>
                                </div>
                                <div className="space-y-4">
                                    {(sessionHistory[sessionDate]?.drills || []).map((d, i) => (
                                        <div key={d.id} className="bg-white p-4 rounded-xl border flex items-center gap-4 shadow-sm border-l-4 border-l-blue-500">
                                            <div className="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-black text-sm">{i+1}</div>
                                            <div className="flex-1">
                                                <div className="font-bold uppercase text-sm text-slate-700">{d.name}</div>
                                                <div className="text-[10px] text-slate-400">{d.desc || 'Sem descrição.'}</div>
                                            </div>
                                            <button onClick={()=>{
                                                const current = sessionHistory[sessionDate].drills.filter(drill => drill.id !== d.id);
                                                setSessionHistory({...sessionHistory, [sessionDate]: { ...sessionHistory[sessionDate], drills: current }});
                                            }} className="text-red-400"><Icon name="trash" size={16}/></button>
                                        </div>
                                    ))}
                                    {(!sessionHistory[sessionDate]?.drills?.length) && <div className="text-center py-20 text-slate-400 font-bold uppercase text-xs">Nenhum exercício para este dia. Adicione via Biblioteca.</div>}
                                </div>
                            </div>
                        )}

                        {/* OUTRAS ABAS (SQUAD, SCUTING, ETC) SEGUREM O MESMO PADRÃO ORIGINAL... */}
                        {tab === 'dashboard' && <div className="p-10 text-center font-bold text-slate-300 uppercase">Dashboard Profissional Carregado.</div>}
                    </div>
                </div>
            );
        };

        // --- AUTH WRAPPER ---
        const Main = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                auth.onAuthStateChanged(u => { setUser(u); setLoading(false); document.getElementById('loading').style.display = 'none'; });
            }, []);
            if (loading) return null;
            return user ? <App user={user} /> : <Login />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
