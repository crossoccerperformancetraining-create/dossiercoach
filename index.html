<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach V2106 - Adriano Cabeça Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyDoS1YJM7etljp__bFp8on52E3qsSUob4Y",
        authDomain: "dossiercoach.firebaseapp.com",
        projectId: "dossiercoach",
        storageBucket: "dossiercoach.firebasestorage.app",
        messagingSenderId: "876303911614",
        appId: "1:876303911614:web:be19c809e8a7e42313ecef"
      };
      
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      const auth = firebase.auth();
      
      db.enablePersistence().catch(function(err) {
          console.warn("Erro no modo offline:", err);
      });
    </script>

    <style>
        body { overscroll-behavior-y: contain; background-color: #f1f5f9; color: #0f172a; font-family: sans-serif; }
        .print-card { @apply bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-4; }
        .grass-pattern { background-color: #15803d; background-image: repeating-linear-gradient(0deg, transparent, transparent 10%, rgba(255,255,255,0.1) 10%, rgba(255,255,255,0.1) 11%); }
        #loading { position: fixed; inset: 0; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 10px; }
        @media print { .no-print { display: none !important; } body { background: white !important; } }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col">
    
    <div id="loading">
        <div class="text-3xl font-black italic">PROCOACH V2106</div>
        <div class="text-sm opacity-70">Conectando Adriano Cabeça...</div>
    </div>

    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- HOOK DE PERSISTÊNCIA ---
        const useFirebaseStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });

            useEffect(() => {
                const user = firebase.auth().currentUser;
                if (user) {
                    db.collection('users').doc(user.uid).collection('data').doc(key)
                      .get().then(doc => {
                          if (doc.exists) {
                              const parsed = JSON.parse(doc.data().value);
                              setStoredValue(parsed);
                              window.localStorage.setItem(key, doc.data().value);
                          }
                      });
                }
            }, [key]);

            useEffect(() => {
                const strVal = JSON.stringify(storedValue);
                window.localStorage.setItem(key, strVal);
                const user = firebase.auth().currentUser;
                if (user) {
                    db.collection('users').doc(user.uid).collection('data').doc(key)
                      .set({ value: strVal, updated_at: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                }
            }, [key, storedValue]);

            return [storedValue, setStoredValue];
        };

        // --- COMPONENTES DE ÍCONES ---
        const Icon = ({ name, size=18 }) => {
            const icons = {
                home: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>,
                users: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="7" r="4"/><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/></svg>,
                eye: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/></svg>,
                check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
            };
            return <span>{icons[name]}</span>;
        };

        // --- ABA SCOUTING CORRIGIDA ---
        const ScoutingView = ({ scoutingData, setScoutingData, scoutingHistory, setScoutingHistory, themeColor }) => {
            const [showLoad, setShowLoad] = useState(false);
            const data = scoutingData || {};
            const history = Array.isArray(scoutingHistory) ? scoutingHistory : [];

            const updateField = (f, v) => setScoutingData({...data, [f]: v});
            const updateLast5 = (index) => {
                const current = [...(data.last5 || [null, null, null, null, null])];
                const states = [null, 'W', 'D', 'L'];
                current[index] = states[(states.indexOf(current[index]) + 1) % states.length];
                setScoutingData({...data, last5: current});
            };

            const saveReport = () => {
                if(!data.opponent) return alert("Informe o rival.");
                const newReport = { ...data, id: data.id || Date.now() };
                const newHistory = [...history];
                const idx = newHistory.findIndex(h => h.id === newReport.id);
                if(idx >= 0) newHistory[idx] = newReport; else newHistory.push(newReport);
                setScoutingHistory(newHistory);
                setScoutingData(newReport);
                alert("Salvo!");
            };

            return (
                <div className="p-4 h-full overflow-y-auto">
                    <div className="flex justify-between mb-4">
                        <button onClick={()=>setShowLoad(true)} className="bg-white border px-3 py-1 rounded text-xs font-bold">HISTÓRICO</button>
                        <button onClick={saveReport} className="bg-blue-600 text-white px-4 py-1 rounded text-xs font-bold">SALVAR</button>
                    </div>
                    <div className="bg-white p-4 rounded-xl border mb-4">
                        <label className="text-[10px] font-bold text-slate-400 uppercase">Adversário</label>
                        <input className="w-full border-b font-black text-lg outline-none uppercase" value={data.opponent||''} onChange={e=>updateField('opponent',e.target.value)}/>
                        <div className="mt-4 flex gap-1 justify-center">
                            { [0,1,2,3,4].map(i => (
                                <button key={i} onClick={()=>updateLast5(i)} className={`w-8 h-8 rounded text-white font-bold ${(data.last5||[])[i]==='W'?'bg-green-500':(data.last5||[])[i]==='D'?'bg-slate-400':(data.last5||[])[i]==='L'?'bg-red-500':'bg-slate-200'}`}>{(data.last5||[])[i]||'-'}</button>
                            )) }
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <textarea className="w-full h-32 border p-2 text-xs rounded" placeholder="Ataque do Rival..." value={data.offensive||''} onChange={e=>updateField('offensive',e.target.value)}/>
                        <textarea className="w-full h-32 border p-2 text-xs rounded" placeholder="Defesa do Rival..." value={data.defensive||''} onChange={e=>updateField('defensive',e.target.value)}/>
                    </div>
                    {showLoad && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4" onClick={()=>setShowLoad(false)}>
                            <div className="bg-white p-4 rounded-xl w-full max-w-xs" onClick={e=>e.stopPropagation()}>
                                <h3 className="font-bold border-b mb-2">Relatórios</h3>
                                {history.map(h => <div key={h.id} className="p-2 border-b cursor-pointer text-sm" onClick={()=>{setScoutingData(h); setShowLoad(false);}}>{h.opponent}</div>)}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- COMPONENTE PRINCIPAL ---
        const MainApp = () => {
            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);
            const [tab, setTab] = useState('dashboard');
            
            const [themeColor, setThemeColor] = useFirebaseStorage('pc_theme', '#1e3a8a');
            const [players, setPlayers] = useFirebaseStorage('pc_players', [{name: "Atleta 1", pos: 'Goleiro'}]);
            const [scoutingData, setScoutingData] = useFirebaseStorage('pc_scouting', {});
            const [scoutingHistory, setScoutingHistory] = useFirebaseStorage('pc_scouting_history', []);

            useEffect(() => {
                const unsubscribe = firebase.auth().onAuthStateChanged((u) => {
                    setUser(u);
                    setLoadingAuth(false);
                    const loader = document.getElementById('loading');
                    if(loader) loader.style.display = 'none';
                });
                return () => unsubscribe();
            }, []);

            if (loadingAuth) return null;
            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-slate-900 p-4">
                    <form className="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm" onSubmit={async (e)=>{
                        e.preventDefault();
                        try { await firebase.auth().signInWithEmailAndPassword(e.target.email.value, e.target.pass.value); } catch { alert("Erro!"); }
                    }}>
                        <h2 className="text-xl font-black text-center mb-6">PROCOACH LOGIN</h2>
                        <input name="email" type="email" placeholder="E-mail" className="w-full border-b p-2 mb-4 outline-none" required/>
                        <input name="pass" type="password" placeholder="Senha" className="w-full border-b p-2 mb-6 outline-none" required/>
                        <button className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-lg">ENTRAR</button>
                    </form>
                </div>
            );

            return (
                <div className="flex flex-col h-full bg-slate-100">
                    <header className="bg-white border-b p-4 flex justify-between items-center shadow-sm">
                        <div className="font-black text-xl italic" style={{color: themeColor}}>PROCOACH <span className="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded not-italic">V2106</span></div>
                        <button onClick={()=>firebase.auth().signOut()} className="text-[10px] font-bold text-red-500 uppercase">Sair</button>
                    </header>

                    <nav className="bg-slate-200 p-1 flex gap-1">
                        <button onClick={()=>setTab('dashboard')} className={`flex-1 py-2 rounded text-[10px] font-bold ${tab==='dashboard'?'bg-blue-600 text-white':'text-slate-500'}`}>INÍCIO</button>
                        <button onClick={()=>setTab('squad')} className={`flex-1 py-2 rounded text-[10px] font-bold ${tab==='squad'?'bg-blue-600 text-white':'text-slate-500'}`}>PLANTEL</button>
                        <button onClick={()=>setTab('scouting')} className={`flex-1 py-2 rounded text-[10px] font-bold ${tab==='scouting'?'bg-blue-600 text-white':'text-slate-500'}`}>SCOUTING</button>
                    </nav>

                    <main className="flex-1 overflow-hidden">
                        {tab === 'dashboard' && <div className="h-full flex flex-col items-center justify-center text-slate-400 font-bold uppercase text-xs tracking-widest"><Icon name="home" size={48}/><p className="mt-4">Seja bem-vindo, Adriano Cabeça</p></div>}
                        {tab === 'squad' && (
                            <div className="p-4 h-full overflow-y-auto">
                                <button onClick={()=>setPlayers([...players, {name: 'Novo Atleta', pos: 'Meia'}])} className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold text-xs mb-4 shadow">+ ADICIONAR ATLETA</button>
                                {players.map((p,i)=>(
                                    <div key={i} className="bg-white p-3 rounded-lg border mb-2 flex justify-between items-center">
                                        <input className="font-bold text-sm bg-transparent outline-none" value={p.name} onChange={e=>{const n=[...players]; n[i].name=e.target.value; setPlayers(n);}}/>
                                        <span className="text-[10px] font-bold text-slate-400 uppercase">{p.pos}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                        {tab === 'scouting' && <ScoutingView scoutingData={scoutingData} setScoutingData={setScoutingData} scoutingHistory={scoutingHistory} setScoutingHistory={setScoutingHistory} themeColor={themeColor} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
