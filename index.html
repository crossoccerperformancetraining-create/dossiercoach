<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCoach V2106 - Cloud System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        body { overscroll-behavior-y: contain; touch-action: none; background-color: #f1f5f9; color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: background-color 0.3s ease; }
        .glass-input { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 2px 4px; color: white; outline: none; width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; font-size: 11px; }
        .glass-input option { color: #333; background: white; }
        .print-card { @apply bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden; transition: all 0.3s ease; }
        .player-select-card { @apply flex flex-col items-center p-2 border rounded cursor-pointer transition-all hover:bg-slate-50 relative; }
        .player-select-card.selected { @apply bg-green-50 border-green-500 ring-1 ring-green-500; }
        .color-picker-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 2px #e2e8f0; }
        .color-picker-swatch.active { box-shadow: 0 0 0 2px #0f172a; }
        .grass-pattern { background-color: #15803d; background-image: repeating-linear-gradient(0deg, transparent, transparent 10%, rgba(255,255,255,0.1) 10%, rgba(255,255,255,0.1) 11%); }
        .micro-tag { @apply px-2 py-1.5 rounded text-[10px] font-bold text-white mb-1 cursor-pointer hover:opacity-90 transition-opacity text-center shadow-sm w-full block border border-white/20; }
        
        #loading { position: fixed; inset: 0; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 10px; }
        #nuvem-status { position: fixed; top: 0; left: 0; right: 0; background: #10b981; color: white; text-align: center; padding: 6px; font-size: 12px; font-weight: bold; z-index: 99999; display: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s; }
        
        /* ALERTA ONLINE/OFFLINE */
        #conn-status { position: fixed; bottom: 80px; right: 20px; z-index: 9999; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .online-ui { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .offline-ui { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        /* ====== TEMA MODO DARK SEGURO ====== */
        body.dark-theme { background-color: #0f172a; color: #f8fafc; }
        .dark-theme .bg-white { background-color: #1e293b !important; border-color: #334155 !important; color: #f8fafc !important; }
        .dark-theme .bg-slate-50, .dark-theme .bg-slate-100 { background-color: #0f172a !important; border-color: #1e293b !important; color: #cbd5e1 !important; }
        .dark-theme input, .dark-theme select, .dark-theme textarea { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; }
        .dark-theme .text-slate-800, .dark-theme .text-slate-700 { color: #f8fafc !important; }

        @media print { 
            .no-print { display: none !important; } 
            body { background: white; -webkit-print-color-adjust: exact; } 
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col">
    
    <div id="nuvem-status"></div>

    <div id="loading">
        <div class="text-3xl font-black italic">PROCOACH V2106</div>
        <div class="text-sm opacity-70">Sincronizando com a Nuvem...</div>
    </div>

    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAOYj9PajWfITTANzrxhtDYxQOmIOv4raw",
            authDomain: "meu-app-novo-c34ad.firebaseapp.com",
            databaseURL: "https://meu-app-novo-c34ad-default-rtdb.firebaseio.com",
            projectId: "meu-app-novo-c34ad",
            storageBucket: "meu-app-novo-c34ad.firebasestorage.app",
            messagingSenderId: "885326202106",
            appId: "1:885326202106:web:e949de044f7935986e3543"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // --- MONITOR DE CONEXÃO ---
        const ConnectionStatus = () => {
            const [online, setOnline] = useState(navigator.onLine);
            useEffect(() => {
                const up = () => setOnline(true);
                const down = () => setOnline(false);
                window.addEventListener('online', up);
                window.addEventListener('offline', down);
                return () => { window.removeEventListener('online', up); window.removeEventListener('offline', down); };
            }, []);
            return (
                <div id="conn-status" className={`no-print ${online ? 'online-ui' : 'offline-ui'}`}>
                    <span className={`w-2 h-2 rounded-full ${online ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></span>
                    {online ? 'Online' : 'Offline'}
                </div>
            );
        };

        // --- TELA DE LOGIN ---
        const Login = () => {
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const handleLogin = (e) => {
                e.preventDefault();
                auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Credenciais Inválidas"));
            };
            return (
                <div className="h-full w-full flex items-center justify-center bg-slate-900">
                    <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
                        <div className="text-center mb-8"><div className="text-2xl font-black italic">PROCOACH <span className="text-blue-600">V2106</span></div></div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" placeholder="E-mail" className="w-full border p-3 rounded-xl outline-none" onChange={e=>setEmail(e.target.value)} />
                            <input type="password" placeholder="Senha" className="w-full border p-3 rounded-xl outline-none" onChange={e=>setPass(e.target.value)} />
                            <button className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">ACESSAR SISTEMA</button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- WRAPPER DE AUTENTICAÇÃO ---
        const Main = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                    document.getElementById('loading').style.display = 'none';
                });
                return () => unsub();
            }, []);
            if (loading) return null;
            return user ? <><App user={user}/><ConnectionStatus/></> : <Login />;
        };

        // --- SEU APP PROCOACH V2106 (PADRÃO ORIGINAL) ---
        const App = ({ user }) => {
            const [tab, setTab] = useState('dashboard');
            const docRef = db.ref(`users/${user.uid}/procoach_app/master_data`);

            // --- SINCRONIZAÇÃO ORIGINAL ---
            let globalData = {};
            let saveTimeout = null;
            let isFetchingFromCloud = true;

            function triggerCloudSave() {
                if (isFetchingFromCloud) return; 
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    const dataToSave = { ...globalData };
                    dataToSave.lastUpdated = firebase.database.ServerValue.TIMESTAMP;
                    docRef.set(dataToSave).then(() => {
                        const status = document.getElementById('nuvem-status');
                        if(status) {
                            status.style.display = 'block';
                            status.innerHTML = '☁️ Salvo na Nuvem';
                            setTimeout(() => status.style.display = 'none', 2000);
                        }
                    });
                }, 1500); 
            }

            const useSafeStorage = (key, initialValue) => {
                const [storedValue, setStoredValue] = useState(() => {
                    try {
                        const item = window.localStorage.getItem(key);
                        const val = item ? JSON.parse(item) : initialValue;
                        globalData[key] = val;
                        return val;
                    } catch (error) { return initialValue; }
                });
                useEffect(() => {
                    globalData[key] = storedValue;
                    try { window.localStorage.setItem(key, JSON.stringify(storedValue)); } catch (error) {}
                    triggerCloudSave();
                }, [key, storedValue]);
                return [storedValue, setStoredValue];
            };

            // --- TODOS OS SEUS ESTADOS ORIGINAIS ---
            const [themeColor, setThemeColor] = useSafeStorage('pc_theme', '#1e3a8a');
            const [isDarkMode, setIsDarkMode] = useSafeStorage('pc_dark_mode', false);
            const [players, setPlayers] = useSafeStorage('pc_players', []);
            const [sessionHistory, setSessionHistory] = useSafeStorage('pc_history_v2', {});
            const [sessionDrills, setSessionDrills] = useState([]);
            const [libraryDrills, setLibraryDrills] = useSafeStorage('pc_library', []);
            const [sessionDate, setSessionDate] = useState(new Date().toISOString().split('T')[0]);
            // (Coloque aqui o restante das suas variáveis de estado pc_scouting, pc_micro, etc.)

            // EFEITO DARK MODE
            useEffect(() => {
                if (isDarkMode) document.body.classList.add('dark-theme');
                else document.body.classList.remove('dark-theme');
            }, [isDarkMode]);

            // SINCRONIA DA SESSÃO COM HISTÓRICO
            useEffect(() => {
                if (sessionHistory[sessionDate]) {
                    setSessionDrills(sessionHistory[sessionDate].drills || []);
                } else {
                    setSessionDrills([]);
                }
            }, [sessionDate, sessionHistory]);

            // REPARO DA BIBLIOTECA PARA SESSÃO
            const handleAddToSession = (item) => {
                const newDrill = { ...item, id: Date.now() };
                const updated = [...sessionDrills, newDrill];
                setSessionDrills(updated);
                // Salva no histórico global
                setSessionHistory({
                    ...sessionHistory,
                    [sessionDate]: { ...sessionHistory[sessionDate], drills: updated }
                });
            };

            // --- RENDERIZAÇÃO DO SEU HEADER E NAV ORIGINAL ---
            return (
                <div className="flex flex-col h-full overflow-hidden">
                    <div className="bg-white border-b p-2 px-4 flex justify-between items-center shadow-sm z-30 shrink-0">
                        <div className="font-black text-xl italic text-slate-800 uppercase">PROCOACH <span className="text-blue-600">V2106</span></div>
                        <div className="flex gap-2">
                             <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 text-slate-400"><Icon name={isDarkMode ? "sun" : "moon"}/></button>
                             <button onClick={() => setShowSettings(true)} className="p-2 text-slate-400"><Icon name="settings"/></button>
                        </div>
                    </div>

                    {/* SUAS ABAS ORIGINAIS */}
                    <div className="flex bg-slate-100 p-1 gap-1 overflow-x-auto no-print shrink-0">
                        {['dashboard', 'squad', 'lineup', 'performance', 'scouting', 'session', 'postmatch', 'micro', 'board', 'calendar', 'library'].map(t => (
                            <button key={t} onClick={()=>setTab(t)} className={`flex-1 px-4 py-2 rounded text-[10px] font-bold uppercase transition-all shrink-0 ${tab===t?'bg-white shadow text-blue-600':'text-slate-400'}`}>
                                {t}
                            </button>
                        ))}
                    </div>

                    {/* CONTEÚDO ORIGINAL (COLE SUAS VIEWS AQUI) */}
                    <div className="flex-1 overflow-hidden relative">
                        {tab === 'library' && <LibraryView libraryDrills={libraryDrills} setLibraryDrills={setLibraryDrills} onAddToSession={handleAddToSession} themeColor={themeColor} />}
                        {tab === 'session' && <SessionView drills={sessionDrills} setDrills={setSessionDrills} sessionDate={sessionDate} setSessionDate={setSessionDate} history={sessionHistory} setHistory={setSessionHistory} players={players} themeColor={themeColor} />}
                        {/* Outras views seguiriam o mesmo padrão original... */}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
