        const { useState, useEffect, useRef, useMemo } = React;

        // --- HOOK DE DADOS: LOCAL + CLOUD ---
        const useFirebaseStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) { return initialValue; }
            });

            useEffect(() => {
                const user = firebase.auth().currentUser;
                if (user) {
                    db.collection('users').doc(user.uid).collection('data').doc(key)
                      .get().then(doc => {
                          if (doc.exists) {
                              try {
                                  const parsed = JSON.parse(doc.data().value);
                                  setStoredValue(parsed);
                                  window.localStorage.setItem(key, doc.data().value);
                              } catch(e) { console.error("Erro JSON nuvem", e); }
                          }
                      }).catch(err => console.log("Offline", err));
                }
            }, [key]);

            useEffect(() => {
                const strVal = JSON.stringify(storedValue);
                window.localStorage.setItem(key, strVal);
                const user = firebase.auth().currentUser;
                if (user) {
                    db.collection('users').doc(user.uid).collection('data').doc(key)
                      .set({ value: strVal, updated_at: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true })
                      .catch(err => console.log("Salvo localmente.", err));
                }
            }, [key, storedValue]);

            return [storedValue, setStoredValue];
        };

            const [isOnline, setIsOnline] = useState(navigator.onLine);
            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);
            return (
                <div className={`w-full text-center text-[10px] font-bold text-white py-1 z-50 transition-colors shadow-md no-print ${isOnline ? 'bg-green-500' : 'bg-red-500'}`}>

                        <h2 className="text-2xl font-black text-center text-slate-800 mb-1">PROCOACH V2106</h2>
                        <p className="text-center text-xs font-bold text-slate-400 uppercase mb-6 tracking-widest">Acesso Restrito</p>
                        {error && <div className="bg-red-50 text-red-500 text-xs font-bold p-3 rounded mb-4 text-center border border-red-200">{error}</div>}
                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase">E-mail</label>
                                <input type="email" required className="w-full border-b-2 border-slate-200 p-2 font-bold text-slate-700 outline-none focus:border-blue-500 bg-transparent" value={email} onChange={e=>setEmail(e.target.value)} placeholder="coach@email.com" />
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase">Senha</label>
                                <input type="password" required className="w-full border-b-2 border-slate-200 p-2 font-bold text-slate-700 outline-none focus:border-blue-500 bg-transparent" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" />
                            </div>
                            <button type="submit" disabled={loading} className={`w-full text-white font-black py-3 rounded-lg mt-6 shadow-lg transition-opacity flex justify-center items-center gap-2 ${loading ? 'opacity-50' : 'hover:opacity-90'}`} style={{backgroundColor: themeColor}}>
                                {loading ? 'CONECTANDO...' : <><Icon name="check" size={18} /> ENTRAR NO SISTEMA</>}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- COMPONENTES AUXILIARES TÁTICOS ---
        const VerticalPitch = ({ size }) => {
            return ( <div className="w-full h-32 rounded border border-slate-300 relative overflow-hidden flex items-center justify-center grass-pattern shadow-inner group"><svg className="absolute inset-0 w-full h-full p-2 opacity-80" viewBox="0 0 100 140" fill="none" stroke="white" strokeWidth="1.5"><rect x="5" y="5" width="90" height="130" /><line x1="5" y1="70" x2="95" y2="70" /><circle cx="50" cy="70" r="12" /><rect x="25" y="5" width="50" height="20" /><rect x="38" y="5" width="24" height="8" /><path d="M 40 25 Q 50 32 60 25" strokeLinecap="round" /><path d="M 5 10 Q 10 5 10 5" /><path d="M 90 5 Q 90 10 95 10" /><rect x="25" y="115" width="50" height="20" /><rect x="38" y="127" width="24" height="8" /><path d="M 40 115 Q 50 108 60 115" strokeLinecap="round" /><path d="M 5 130 Q 10 135 10 135" /><path d="M 95 130 Q 90 135 90 135" /></svg>{size === 'Pequeno' && <div className="absolute inset-0 flex items-center justify-center"><div className="w-[40%] h-[30%] bg-yellow-400/50 border-2 border-yellow-300 rounded shadow-[0_0_20px_rgba(250,204,21,0.6)] animate-pulse z-10 mix-blend-overlay"></div></div>}{size === 'Médio' && <div className="absolute inset-0 flex items-center justify-center"><div className="w-[90%] h-[50%] bg-yellow-400/40 border-2 border-yellow-300 shadow-[0_0_20px_rgba(250,204,21,0.5)] animate-pulse z-10 mix-blend-overlay"></div></div>}{size === 'Grande' && <div className="absolute inset-0 bg-yellow-400/30 border-4 border-yellow-300 animate-pulse z-10 mix-blend-overlay"></div>}{!size && <div className="absolute inset-0 bg-black/20 flex items-center justify-center z-20"><span className="text-[9px] text-white font-bold bg-black/50 px-2 rounded backdrop-blur-sm">DEFINIR ESPAÇO</span></div>}</div> );
        };

        // --- MODAL CONFIG ---
        const SettingsModal = ({ show, onClose, themeColor, setThemeColor, teamLogo, setTeamLogo, teamName, setTeamName, isDarkMode, setIsDarkMode }) => {
            if (!show) return null;
            const handleLogout = () => { if(window.confirm("Tem certeza que deseja sair do sistema?")) { firebase.auth().signOut().then(() => { window.location.reload(); }); } };
            return ( 
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm no-print" onClick={(e) => { e.preventDefault(); e.stopPropagation(); onClose(); }}> 
                    <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden" onClick={e=>e.stopPropagation()}> 
                        <div className="p-4 text-white flex justify-between items-center" style={{backgroundColor: themeColor}}> 
                            <h3 className="font-bold flex items-center gap-2 text-sm"><Icon name="settings"/> CONFIGURAÇÕES</h3> 
                            <button type="button" onClick={(e) => { e.preventDefault(); e.stopPropagation(); onClose(); }}><Icon name="x"/></button> 
                        </div> 
                        <div className="p-6 max-h-[80vh] overflow-y-auto"> 
                            <div className="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6 cursor-pointer" onClick={()=>setIsDarkMode(!isDarkMode)}>
                                <span className="text-sm font-bold text-slate-700 uppercase flex items-center gap-2">{isDarkMode ? <Icon name="moon" className="text-blue-500"/> : <Icon name="sun" className="text-yellow-500"/>} Modo Noite (Escuro)</span>
                                <div className={`w-12 h-6 rounded-full relative transition-colors ${isDarkMode ? 'bg-blue-500' : 'bg-slate-300'}`}><div className={`w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${isDarkMode ? 'left-7' : 'left-1'}`}></div></div>
                            </div>
                            <h4 className="font-bold text-slate-700 mb-3 text-sm uppercase">Identidade da Equipe</h4> 
                            <input className="w-full border rounded p-2 text-xs mb-3 font-bold" placeholder="Nome da Equipe" value={teamName||''} onChange={e=>setTeamName(e.target.value)} /> 
                            <input className="w-full border rounded p-2 text-xs mb-4" placeholder="URL do Escudo (Imagem)" value={teamLogo||''} onChange={e=>setTeamLogo(e.target.value)} /> 
                            <h4 className="font-bold text-slate-700 mb-3 text-sm uppercase">Cor Principal</h4> 
                            <div className="flex gap-3 justify-center flex-wrap mb-6"> 
                                {themeColors.map(color => ( <div key={color} className={`color-picker-swatch ${themeColor === color ? 'active' : ''}`} style={{backgroundColor: color}} onClick={() => setThemeColor(color)}></div> ))} 
                            </div> 
                            <div className="border-t border-slate-200 mt-4 pt-4 flex flex-col gap-2"> 
                                <button type="button" onClick={handleLogout} className="w-full bg-red-500 text-white py-3 rounded text-xs font-black flex items-center justify-center gap-2 hover:bg-red-600 transition-colors shadow-md">SAIR DO SISTEMA (LOGOUT)</button>
                            </div>
                        </div> 
                    </div> 
                </div> 
            ); 
        };

        // --- MODAL DE ESTATÍSTICA (CORRIGIDO PARA NÃO SAIR DO APP) ---
        const SeasonStatsModal = ({ show, onClose, stats, setStats, themeColor }) => {
            if (!show) return null;
            const updateStat = (type, field, val) => { const n = { ...stats }; n[type][field] = parseInt(val) || 0; setStats(n); };
            const calculatePct = (p, w, d) => { 
                p = Number(p) || 0; w = Number(w) || 0; d = Number(d) || 0;
                if(p === 0) return 0; 
                return (((w * 3) + d) / (p * 3) * 100).toFixed(1); 
            };
            const totals = { 
                p: (Number(stats.league.p)||0) + (Number(stats.cup.p)||0) + (Number(stats.friendly.p)||0), 
                w: (Number(stats.league.w)||0) + (Number(stats.cup.w)||0) + (Number(stats.friendly.w)||0), 
                d: (Number(stats.league.d)||0) + (Number(stats.cup.d)||0) + (Number(stats.friendly.d)||0), 
                l: (Number(stats.league.l)||0) + (Number(stats.cup.l)||0) + (Number(stats.friendly.l)||0), 
                gf: (Number(stats.league.gf)||0) + (Number(stats.cup.gf)||0) + (Number(stats.friendly.gf)||0), 
                ga: (Number(stats.league.ga)||0) + (Number(stats.cup.ga)||0) + (Number(stats.friendly.ga)||0), 
            };
            const totalPct = calculatePct(totals.p, totals.w, totals.d);
            
            const handleClose = (e) => {
                e.preventDefault();
                e.stopPropagation();
                onClose();
            };

            return ( 
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm" onClick={handleClose}> 
                    <div className="bg-white rounded-xl w-full max-w-3xl overflow-hidden" onClick={e=>e.stopPropagation()}> 
                        <div className="p-4 text-white flex justify-between items-center" style={{backgroundColor: themeColor}}>
                            <h3 className="font-bold flex items-center gap-2"><Icon name="chart"/> ESTATÍSTICAS DA TEMPORADA</h3>
                            <button type="button" onClick={handleClose}><Icon name="x"/></button>
                        </div> 
                        <div className="p-4 overflow-x-auto">
                            <table className="w-full text-center text-xs">
                                <thead className="font-bold uppercase text-slate-500 bg-slate-100">
                                    <tr><th className="p-2 text-left">Competição</th><th>Jogos</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th><th>% Aprov.</th></tr>
                                </thead>
                                <tbody>
                                    {['league', 'cup', 'friendly'].map(type => { 
                                        const s = stats[type]; 
                                        const pct = calculatePct(s.p, s.w, s.d); 
                                        const sg = (Number(s.gf)||0) - (Number(s.ga)||0); 
                                        return ( 
                                            <tr key={type} className="border-b">
                                                <td className="p-2 text-left font-bold uppercase">{type === 'league' ? 'Camp.' : type === 'cup' ? 'Copa' : 'Amistoso'}</td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded" value={s.p} onChange={e=>updateStat(type, 'p', e.target.value)}/></td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded bg-green-50 text-green-700 font-bold" value={s.w} onChange={e=>updateStat(type, 'w', e.target.value)}/></td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded bg-gray-50 text-gray-700 font-bold" value={s.d} onChange={e=>updateStat(type, 'd', e.target.value)}/></td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded bg-red-50 text-red-700 font-bold" value={s.l} onChange={e=>updateStat(type, 'l', e.target.value)}/></td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded" value={s.gf} onChange={e=>updateStat(type, 'gf', e.target.value)}/></td>
                                                <td className="p-1"><input type="number" className="w-10 text-center border rounded" value={s.ga} onChange={e=>updateStat(type, 'ga', e.target.value)}/></td>
                                                <td className={`p-1 font-bold ${sg > 0 ? 'text-green-600' : sg < 0 ? 'text-red-600' : 'text-gray-400'}`}>{sg}</td>
                                                <td className="p-1 font-black">{pct}%</td>
                                            </tr> 
                                        ) 
                                    })}
                                    <tr className="bg-slate-50 font-black text-slate-800 border-t-2 border-slate-200">
                                        <td className="p-3 text-left">TOTAL</td><td>{totals.p}</td><td className="text-green-600">{totals.w}</td><td className="text-gray-600">{totals.d}</td><td className="text-red-600">{totals.l}</td><td>{totals.gf}</td><td>{totals.ga}</td><td>{(totals.gf - totals.ga)}</td><td className={`${totalPct > 60 ? 'text-green-600' : totalPct < 40 ? 'text-red-600' : 'text-blue-600'}`}>{totalPct}%</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div> 
                        <div className="p-4 border-t border-slate-200 bg-slate-50">
                            <button type="button" onClick={handleClose} className="w-full bg-slate-800 text-white font-bold py-3 rounded-lg hover:bg-slate-700 transition shadow-sm text-xs">FECHAR ESTATÍSTICAS (SALVO AUTO)</button>
                        </div> 
                    </div> 
                </div> 
            );
        };

        // --- VIEWS ---
        const DashboardView = ({ themeColor, players, matchHistory, setTab, teamLogo, scoutingData, microData, calendarData, header, seasonStats, openStats, notices, setNotices }) => { 
            const today = new Date().toISOString().split('T')[0]; 
            const todayWeekDayIndex = new Date().getDay(); 
            const weekDaysMap = ['DOMINGO','SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO'];
            const todayWeekDay = weekDaysMap[todayWeekDayIndex];
            const microDay = microData[todayWeekDay] || {blocks:[]};
            const mergedAgenda = [...(microDay.blocks || []).map(b => ({ ...b, source: 'micro' })), ...(calendarData[today] || []).map(ev => ({ ...ev, source: 'calendar' }))];
            
            const [newNoticeText, setNewNoticeText] = useState('');
            return ( 
                <div className="p-4 bg-slate-50 h-full overflow-y-auto animate-fade-in grid grid-cols-1 md:grid-cols-2 gap-4 content-start"> 
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 col-span-full flex justify-between items-center" style={{borderLeft: `4px solid ${themeColor}`}}> 
                        <div className="flex items-center gap-4"> 
                            <div className="w-14 h-14 bg-slate-100 rounded-full border border-slate-200 flex items-center justify-center overflow-hidden">{teamLogo ? <img src={teamLogo} className="w-full h-full object-contain"/> : <Icon name="users" size={24} className="opacity-30"/>}</div> 
                            <div><h2 className="text-xl font-black text-slate-800 uppercase">{header.teamName || 'MINHA EQUIPE'}</h2><div className="text-sm text-slate-500">Bem-vindo, Professor.</div></div> 
                        </div> 
                        <div className="flex gap-2"> 
                            <button type="button" onClick={openStats} className="bg-slate-800 text-white px-3 py-1 rounded text-xs font-bold shadow hover:bg-slate-700 flex items-center gap-1 transition"><Icon name="chart"/> ESTATÍSTICAS</button> 
                        </div> 
                    </div> 
                    
                    <div className="bg-white rounded-xl shadow-sm border p-4 cursor-pointer hover:bg-slate-50 transition-all relative overflow-hidden group"> 
                        <h3 className="font-bold text-xs text-slate-400 uppercase mb-3 flex gap-2"><Icon name="whistle"/> Próximo Jogo</h3> 
                        {scoutingData.opponent ? ( 
                            <div className="flex flex-col items-center" onClick={()=>setTab('scouting')}> 
                                <div className="text-xl font-black text-slate-800">{scoutingData.opponent}</div> 
                                <button type="button" className="mt-4 bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full text-[10px] font-bold shadow">VER SCOUT</button> 
                            </div> 
                        ) : <div className="text-slate-300 py-6 text-sm text-center">Nenhum adversário.</div>} 
                    </div> 

                    <div className="bg-white rounded-xl shadow-sm border p-4"> 
                        <h3 className="font-bold text-xs text-slate-400 uppercase mb-3 flex gap-2"><Icon name="calendar"/> Agenda de Hoje</h3> 
                        <div className="space-y-2 h-32 overflow-y-auto"> 
                            {mergedAgenda.length > 0 ? ( mergedAgenda.map((ev, i) => ( <div key={i} className={`flex items-center gap-2 p-2 rounded border ${ev.period==='M'?'bg-yellow-50 border-yellow-100':'bg-blue-50 border-blue-100'}`}> <span className="text-[10px] font-bold opacity-50 w-8">{ev.period==='M'?'MANHÃ':'TARDE'}</span> <span className={`text-[10px] font-bold text-white px-2 rounded ${ev.color}`}>{ev.label}</span> </div> )) ) : <div className="text-center text-slate-300 text-xs py-4">Livre hoje.</div>} 
                        </div> 
                    </div> 
                    
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 col-span-full">
                        <h3 className="font-bold text-xs text-slate-400 uppercase mb-2 flex items-center gap-2"><Icon name="clipboard"/> Mural de Avisos</h3>
                        <div className="flex gap-2 mb-2">
                            <input type="text" className="border rounded px-2 py-1 text-xs flex-1 outline-none" placeholder="Novo aviso..." value={newNoticeText} onChange={e=>setNewNoticeText(e.target.value)}/>
                            <button type="button" onClick={()=>{if(newNoticeText) { setNotices([{id: Date.now(), date: today, text: newNoticeText}, ...notices]); setNewNoticeText(''); }}} className="bg-blue-500 text-white px-3 py-1 rounded text-xs font-bold hover:bg-blue-600">ADD</button>
                        </div>
                        <div className="h-32 overflow-y-auto space-y-1 bg-yellow-50 border border-yellow-100 rounded p-2">
                            {notices.length > 0 ? notices.map(n => (<div key={n.id} className="flex justify-between border-b border-yellow-200 pb-1 mb-1"><div className="text-xs text-slate-700 font-medium">{n.text}</div><button type="button" onClick={()=>setNotices(notices.filter(x=>x.id!==n.id))} className="text-red-400"><Icon name="trash" size={12}/></button></div>)) : <div className="text-xs text-slate-400 italic text-center mt-4">Vazio.</div>}
                        </div>
                    </div> 
                </div> 
            ); 
        };
        
        // --- SQUAD VIEW ---
        const SquadView = ({ players, setPlayers, themeColor, history }) => { 
            const [viewProfile, setViewProfile] = useState(null); 
            const handleUpdatePlayer = (f, v) => { const n = [...players]; n[viewProfile][f] = v; setPlayers(n); }; 
            const handleUpdateStat = (f, v) => { const n = [...players]; if(!n[viewProfile].stats) n[viewProfile].stats={}; n[viewProfile].stats[f]=v; setPlayers(n); }; 

            const validAges = players.map(p => parseInt(p.age)).filter(a => !isNaN(a) && a > 0);
            const avgAge = validAges.length ? (validAges.reduce((a,b)=>a+b,0) / validAges.length).toFixed(1) : '-';
            const validHeights = players.map(p => parseFloat(p.height)).filter(h => !isNaN(h) && h > 0);
            const avgHeight = validHeights.length ? (validHeights.reduce((a,b)=>a+b,0) / validHeights.length).toFixed(2) : '-';

            return ( 
                <div className="p-6 bg-slate-50 h-full overflow-y-auto animate-fade-in relative"> 
                    <PlayerProfileModal player={players[viewProfile]} playerIndex={viewProfile} themeColor={themeColor} onClose={()=>setViewProfile(null)} onUpdate={handleUpdatePlayer} onUpdateStat={handleUpdateStat} history={history} /> 
                    <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 border-b border-slate-200 pb-4 no-print gap-4">
                        <h2 className="text-2xl font-bold flex items-center gap-2" style={{color: themeColor}}><Icon name="users"/> Gestão do Plantel</h2>
                        <div className="flex gap-2">
                            <span className="bg-white border border-slate-200 px-3 py-1.5 rounded-lg shadow-sm text-xs font-black text-slate-600 uppercase">Idade: <span className="text-blue-500">{avgAge}</span></span>
                            <span className="bg-white border border-slate-200 px-3 py-1.5 rounded-lg shadow-sm text-xs font-black text-slate-600 uppercase">Altura: <span className="text-blue-500">{avgHeight}m</span></span>
                        </div>
                    </div> 
                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4"> 
                        {players.map((p, i) => ( <div key={i} onClick={()=>setViewProfile(i)} className="print-card bg-white rounded-xl shadow border border-slate-100 p-3 flex flex-col items-center cursor-pointer"> 
                            <div className="w-16 h-16 rounded-full bg-slate-100 overflow-hidden border-2 mb-2" style={{borderColor: themeColor}}> {p.image ? <img src={p.image} className="w-full h-full object-cover"/> : <Icon name="users" size={32} className="mt-4 opacity-30"/>} </div> 
                            <span className="font-bold text-slate-700 text-center uppercase">{p.name}</span> 
                            {/* EXIBE O PÉ DOMINANTE AQUI */}
                            <div className="text-[10px] text-slate-500 font-bold uppercase mt-1 flex gap-2 items-center"><span>{p.pos || 'POS'}</span><span>|</span><span>{p.age ? `${p.age}a` : '-'}</span><span>|</span><span className="bg-slate-100 px-1 rounded">{p.foot==='Canhoto'?'CAN':p.foot==='Ambidestro'?'AMB':'DES'}</span></div> 
                        </div> ))} 
                        <button type="button" onClick={()=>setPlayers([...players, {name: "Novo Atleta", pos: 'Goleiro', foot: 'Destro', stats: {}}])} className="bg-white rounded-xl shadow border border-dashed border-slate-300 flex items-center justify-center text-slate-400 hover:text-blue-500 h-32 font-bold"><Icon name="plus" size={32}/></button> 
                    </div> 
                </div> 
            ); 
        };

        // --- MICROCYCLE VIEW (COM IA) ---
        const MicrocycleView = ({ micro, setMicro, themeColor, calendar }) => { 
            const weekDays = ['SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO', 'DOMINGO']; 
            const [activeSelection, setActiveSelection] = useState(null); 
            const [aiTip, setAiTip] = useState(null); // Estado da Dica IA

            const updateDay = (day, f, v) => { const n = {...micro}; if(!n[day]) n[day]={blocks:[], mdTag: '-'}; n[day][f]=v; setMicro(n); }; 
            
            const handleAiTip = (mdTag) => {
                const tips = {
                    "MD-5 (Recup.)": "🟢 Intensidade Baixa. Foco em recuperar a musculatura após o último jogo. Rondo suave, corrida leve e liberação.",
                    "MD-4 (Força)": "🔴 Força/Tensão máxima! Espaços reduzidos (Pequeno), 3v3 a 5v5. Acelerações, frenagens e duelos intensos.",
                    "MD-3 (Resist.)": "🟠 Resistência Tática. Espaços grandes (Médio/Grande), 7v7 a 10v10. Trabalhar o modelo de jogo com bola longa.",
                    "MD-2 (Velocid.)": "⚡ Velocidade e Reação. Espaços médios, transições rápidas e finalizações sem contato físico prolongado.",
                    "MD-1 (Ativação)": "🟡 Volume muito baixo. Foco mental: bolas paradas, 11x0 (sombra) e ativação rápida do SNC.",
                    "MD (JOGO)": "⚽ DIA DE COMPETIÇÃO. Foco, preleção e aquecimento neuromuscular.",
                    "MD+1 (Recup.)": "🟢 Titulares: Recuperação ativa. Reservas: Treino compensatório de força/resistência.",
                    "MD+2 (Folga)": "⚪ Off físico e mental total."
                };
                setAiTip({ tag: mdTag, text: tips[mdTag] || "Selecione um MD para ver a sugestão da IA." });
            };

            return ( 
                <div className="p-4 bg-slate-50 h-full overflow-x-auto relative animate-fade-in">
                    {/* MODAL DA DICA DA IA */}
                    {aiTip && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 no-print" onClick={()=>setAiTip(null)}>
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl relative" onClick={e=>e.stopPropagation()}>
                                <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-blue-600 text-white p-3 rounded-full shadow-lg border-4 border-white"><Icon name="bot" size={24}/></div>
                                <h3 className="font-black text-center text-slate-800 mt-4 mb-2 text-lg">Assistente IA</h3>
                                <p className="text-center font-bold text-blue-600 text-xs uppercase mb-4 bg-blue-50 py-1 rounded">{aiTip.tag}</p>
                                <p className="text-sm text-slate-600 font-medium text-center leading-relaxed">{aiTip.text}</p>
                                <button onClick={()=>setAiTip(null)} className="w-full mt-6 bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-700">ENTENDIDO</button>
                            </div>
                        </div>
                    )}

                    <div className="flex gap-4 min-w-[1400px]"> 
                        {weekDays.map(day => { 
                            const d = micro[day] || {blocks:[], mdTag: '-'}; 
                            return ( 
                                <div key={day} className="w-52 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-full shrink-0"> 
                                    <div className="p-2 text-center text-white font-bold text-xs rounded-t-xl uppercase flex flex-col items-center relative" style={{backgroundColor: themeColor}}>
                                        {day}
                                        <div className="flex w-full mt-1 gap-1">
                                            <select className="text-[9px] flex-1 text-center bg-black/20 text-white font-bold border-none outline-none rounded p-0.5 cursor-pointer" value={d.mdTag || '-'} onChange={e=>updateDay(day, 'mdTag', e.target.value)}>
                                                {MD_OPTIONS.map(o => <option key={o} value={o} className="text-slate-800 bg-white">{o}</option>)}
                                            </select>
                                            {/* BOTÃO DA IA */}
                                            <button type="button" onClick={()=>handleAiTip(d.mdTag)} className="bg-blue-500 hover:bg-blue-400 px-1 rounded flex items-center justify-center" title="Dica IA">🤖</button>
                                        </div>
                                    </div> 
                                    {/* ... resto do dia do microciclo ... */}
                                    <div className="p-2 bg-slate-50 border-t rounded-b-xl mt-auto"> 
                                        <div className="flex justify-between mb-2"> <button type="button" onClick={()=>updateDay(day, 'fieldSize', 'Pequeno')} className={`text-[8px] px-1 py-1 rounded font-bold border ${d.fieldSize==='Pequeno'?'bg-green-100 border-green-500 text-green-700':'bg-white border-slate-200 text-slate-400'}`}>PEQ</button> <button type="button" onClick={()=>updateDay(day, 'fieldSize', 'Médio')} className={`text-[8px] px-1 py-1 rounded font-bold border ${d.fieldSize==='Médio'?'bg-yellow-100 border-yellow-500 text-yellow-700':'bg-white border-slate-200 text-slate-400'}`}>MÉD</button> <button type="button" onClick={()=>updateDay(day, 'fieldSize', 'Grande')} className={`text-[8px] px-1 py-1 rounded font-bold border ${d.fieldSize==='Grande'?'bg-red-100 border-red-500 text-red-700':'bg-white border-slate-200 text-slate-400'}`}>GRD</button> </div> <VerticalPitch size={d.fieldSize} /> 
                                    </div> 
                                </div> 
                            ) 
                        })} 
                    </div>
                </div> 
            ); 
        };

        // --- SESSION VIEW (AGORA COM BOTÃO PUXAR DA BIBLIOTECA) ---
        const SessionView = ({ drills, setDrills, header, setHeader, logo, themeColor, players, history, setHistory, sessionDate, setSessionDate, teamName, libraryDrills }) => {
            const [localRatings, setLocalRatings] = useState({});
            const [showLibModal, setShowLibModal] = useState(false); // Modal da Biblioteca
            
            useEffect(() => { 
                if (history && history[sessionDate]) { setDrills(Array.isArray(history[sessionDate].drills) ? history[sessionDate].drills : []); setLocalRatings(history[sessionDate].ratings || {}); } 
                else { setDrills([]); setLocalRatings({}); }
            }, [sessionDate, history]); 
            
            const updateDrill = (idx, f, v) => { const n=[...drills]; n[idx] = { ...n[idx], [f]: v }; setDrills(n); };
            const saveSession = () => { try { const newH = { ...history, [sessionDate]: { drills, ratings: localRatings, header } }; setHistory(newH); alert("Salvo com sucesso!"); } catch(e) { alert("Erro!"); } };
            const safeDrills = Array.isArray(drills) ? drills : [];

            const importFromLib = (item) => {
                setDrills([...safeDrills, { ...item, id: Date.now() }]);
                setShowLibModal(false);
            };

            return (
                <div className="flex flex-col md:flex-row h-full bg-slate-50 overflow-hidden text-slate-800 animate-fade-in relative">
                    
                    {/* MODAL DE IMPORTAR DA BIBLIOTECA */}
                    {showLibModal && (
                        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 no-print" onClick={()=>setShowLibModal(false)}>
                            <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[80vh] overflow-y-auto shadow-2xl p-4" onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4 border-b pb-2">
                                    <h3 className="font-bold flex items-center gap-2 text-slate-700"><Icon name="book"/> Importar da Biblioteca</h3>
                                    <button onClick={()=>setShowLibModal(false)}><Icon name="x"/></button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {libraryDrills.map(item => (
                                        <div key={item.libId} onClick={()=>importFromLib(item)} className="border rounded-xl p-3 flex gap-3 cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition">
                                            <div className="w-20 h-20 bg-slate-200 rounded-lg shrink-0 flex items-center justify-center overflow-hidden">{item.image ? <img src={item.image} className="w-full h-full object-cover"/> : <Icon name="image" className="opacity-40"/>}</div>
                                            <div><div className="font-bold text-sm text-slate-800">{item.name}</div><div className="text-[10px] text-slate-500 line-clamp-2 mt-1">{item.desc}</div><button className="mt-2 bg-slate-800 text-white text-[9px] font-bold px-3 py-1 rounded">USAR HOJE</button></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex-1 overflow-y-auto p-4" id="print-area">
                        <div className="text-white p-3 rounded-xl shadow mb-4 flex justify-between items-center no-print" style={{backgroundColor: themeColor}}>
                             <div className="flex items-center gap-2"><input type="date" value={sessionDate} onChange={e=>setSessionDate(e.target.value)} className="bg-white/20 border border-white/30 rounded px-2 py-1 font-bold text-sm cursor-pointer outline-none"/></div>
                             <div className="flex gap-2">
                                <button type="button" onClick={()=>window.print()} className="flex items-center gap-1 bg-white/20 text-white px-3 py-1 rounded font-bold text-xs hover:bg-white/30 shadow transition"><Icon name="pdf"/> PDF</button>
                                <button type="button" onClick={saveSession} className="flex items-center gap-1 bg-green-500 text-white px-3 py-1 rounded font-bold text-xs hover:bg-green-600 shadow transition"><Icon name="check"/> SALVAR</button>
                            </div>
                        </div>
                        
                        <div className="space-y-6 pb-20">
                            {safeDrills.length > 0 ? safeDrills.map((drill, idx) => (
                                <div key={drill.id || idx} className="print-card bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden page-break">
                                    <div className="bg-slate-50 border-b p-2 flex justify-between items-center"><div className="flex gap-2 items-center"><span className="text-white font-bold text-xs px-2 py-1 rounded w-10 text-center" style={{backgroundColor: themeColor}}>{idx+1}</span><input className="font-bold bg-transparent outline-none uppercase text-sm w-40" value={drill.name} onChange={e=>updateDrill(idx,'name',e.target.value)}/></div><button type="button" onClick={()=>setDrills(safeDrills.filter((_,i)=>i!==idx))} className="text-red-400 no-print ml-2"><Icon name="trash" size={14}/></button></div>
                                    <div className="flex h-72">
                                        <div className="w-1/2 bg-slate-100 flex items-center justify-center relative">{drill.image ? <img src={drill.image} className="w-full h-full object-contain" /> : <div className="text-slate-400 flex flex-col items-center"><Icon name="image" size={32}/></div>}</div>
                                        <div className="w-1/2 p-3 flex flex-col gap-2">
                                            <textarea className="flex-1 w-full bg-slate-50 border rounded p-2 text-xs resize-none outline-none" value={drill.desc} onChange={e=>updateDrill(idx,'desc',e.target.value)} placeholder="Descrição..."/>
                                            {/* CAMPO DE LINK YOUTUBE */}
                                            <div className="flex items-center gap-2 bg-slate-100 p-2 rounded-lg border border-slate-200 no-print">
                                                <Icon name="link" size={16} className="text-red-500" />
                                                <input className="flex-1 bg-transparent outline-none text-xs font-bold text-slate-700" placeholder="Link do Vídeo..." value={drill.linkUrl || ''} onChange={e=>updateDrill(idx,'linkUrl',e.target.value)} />
                                                {drill.linkUrl && <a href={drill.linkUrl.startsWith('http') ? drill.linkUrl : `https://${drill.linkUrl}`} target="_blank" className="bg-red-500 text-white text-[10px] font-bold px-3 py-1.5 rounded shadow hover:bg-red-600 transition">VER</a>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )) : <div className="text-center p-8 text-slate-400 border-2 border-dashed rounded-xl font-bold">Treino vazio. Crie ou importe da biblioteca.</div>}
                            
                            {/* BOTÃO DE IMPORTAR DA BIBLIOTECA NA TELA DE SESSÃO */}
                            <div className="grid grid-cols-2 gap-4 no-print">
                                <button type="button" onClick={()=>{setDrills([...safeDrills, { id: Date.now(), name: 'NOVO EXERCÍCIO', method: 'Treino Tático', dim: '-', time: '10', desc: '', variants: '', image: null, linkUrl: '' }])}} className="w-full py-4 border-2 border-dashed border-slate-300 rounded-xl text-slate-400 hover:border-blue-500 hover:text-blue-500 font-bold flex items-center justify-center gap-2 transition"><Icon name="plus"/> MANUAL</button>
                                <button type="button" onClick={()=>setShowLibModal(true)} className="w-full py-4 border-2 border-slate-300 bg-slate-800 text-white rounded-xl hover:bg-slate-700 font-bold flex items-center justify-center gap-2 transition shadow-lg"><Icon name="book"/> BUSCAR NA BIBLIOTECA</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- POST MATCH VIEW (COM DESTAQUE E RESUMO TÁTICO) ---
        const PostMatchView = ({ themeColor, matchData, setMatchData, players, setPlayers, matchHistory, setMatchHistory, teamLogo }) => { 
            const saveMatch = () => { alert("Salvo no histórico!"); }; 
            return ( 
                <div className="p-4 h-full overflow-y-auto flex flex-col md:flex-row gap-4 animate-fade-in relative"> 
                    <div className="flex-1 space-y-4"> 
                        <div className="bg-white p-4 rounded-xl shadow-sm border text-center"> 
                            <div className="flex justify-between items-center px-4">
                                <div className="flex flex-col items-center w-24"><div className="w-16 h-16 bg-slate-100 rounded-full border mb-1 flex items-center justify-center overflow-hidden">{teamLogo ? <img src={teamLogo} className="w-full h-full object-contain"/> : <span className="text-[9px]">MEU TIME</span>}</div><input className="w-12 text-center text-3xl font-black border rounded bg-transparent" value={matchData.goalsUs||0} onChange={e=>setMatchData({...matchData, goalsUs:e.target.value})}/></div>
                                <div className="text-2xl font-black text-slate-300">X</div>
                                <div className="flex flex-col items-center w-24"><div className="w-16 h-16 bg-slate-100 rounded-full border mb-1 flex items-center justify-center overflow-hidden bg-white">{matchData.logo ? <img src={matchData.logo} className="w-full h-full object-contain"/> : <span className="text-[9px] text-slate-400">URL</span>}</div><input className="w-12 text-center text-3xl font-black border rounded bg-transparent" value={matchData.goalsThem||0} onChange={e=>setMatchData({...matchData, goalsThem:e.target.value})}/></div>
                            </div> 
                            <div className="mt-4 flex gap-2 justify-center"><input className="border-b text-xs text-center outline-none font-bold uppercase bg-transparent" placeholder="NOME DO RIVAL" value={matchData.opponent||''} onChange={e=>setMatchData({...matchData, opponent:e.target.value})}/></div> 
                        </div> 
                        
                        <div className="bg-white p-4 rounded-xl shadow-sm border">
                            <div className="text-xs font-bold text-slate-400 uppercase mb-2">Escalar 11 Iniciais (Clique)</div>
                            <div className="flex flex-wrap gap-2 max-h-32 overflow-y-auto">{players.map((p, i) => (<div key={i} className={`cursor-pointer border rounded-full px-2 py-1 text-[10px] font-bold flex items-center gap-1 ${matchData.starters?.includes(i) ? 'bg-green-500 text-white border-green-600' : 'bg-slate-50 text-slate-500'}`}>{p.name}</div>))}</div>
                        </div> 
                    </div> 
                    
                    {/* NOVA ÁREA DE RELATÓRIO DO PÓS JOGO */}
                    <div className="w-full md:w-80 space-y-4">
                        <div className="bg-white rounded-xl shadow-sm border p-4">
                            <h3 className="text-xs font-bold text-slate-400 uppercase mb-2 flex items-center gap-1"><Icon name="star" size={14}/> Destaque (Craque do Jogo)</h3>
                            <select className="w-full border-b outline-none font-black text-sm text-blue-600 bg-transparent py-1" value={matchData.motm || ''} onChange={e=>setMatchData({...matchData, motm: e.target.value})}>
                                <option value="">Selecione quem foi bem...</option>
                                {players.map((p,i)=><option key={i} value={p.name}>{p.name}</option>)}
                            </select>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-sm border p-4">
                            <h3 className="text-xs font-bold text-slate-400 uppercase mb-2 flex items-center gap-1"><Icon name="clipboard" size={14}/> Resumo / Feedback Tático</h3>
                            <textarea className="w-full h-40 bg-slate-50 border border-slate-200 rounded p-2 text-xs outline-none resize-none" value={matchData.notes || ''} onChange={e=>setMatchData({...matchData, notes: e.target.value})} placeholder="O que deu certo? Quais erros defensivos corrigir para a próxima semana? Documente aqui o comportamento do time..."></textarea>
                        </div>
                        <button type="button" onClick={saveMatch} className="w-full bg-blue-600 text-white py-3 rounded-xl font-black shadow-lg hover:bg-blue-700 transition">SALVAR RELATÓRIO</button>
                    </div> 
                </div> 
            ); 
        };

        // --- APP PRINCIPAL E ROTEAMENTO (MANTIDO INTACTO) ---
        const MainApp = () => {
            const [user, setUser] = useState(null);
            const [loadingAuth, setLoadingAuth] = useState(true);

            useEffect(() => {
                const el = document.getElementById('loading');
                const unsubscribe = firebase.auth().onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setLoadingAuth(false);
                    if(el) el.style.display = 'none';
                });
                return () => unsubscribe();
            }, []);

            if (loadingAuth) return null;
            if (!user) return <LoginScreen themeColor="#1e3a8a" />;
            return <ProCoachApp user={user} />;
        };

        const ProCoachApp = ({ user }) => {
            const [tab, setTab] = useState('dashboard');
            
            const [themeColor, setThemeColor] = useFirebaseStorage('pc_theme', '#1e3a8a');
            const [header, setHeader] = useFirebaseStorage('pc_header', { local: 'CT', time: '09:00', dur: '90' });
            const [teamName, setTeamName] = useFirebaseStorage('pc_team_name', 'MINHA EQUIPE');
            const [teamLogo, setTeamLogo] = useFirebaseStorage('pc_team_logo_url', null);
            
            const [players, setPlayers] = useFirebaseStorage('pc_players', [{name: "Jogador", pos: 'Zagueiro', foot: 'Destro', stats: {}}]);
            const [sessionHistory, setSessionHistory] = useFirebaseStorage('pc_history_v2', {});
            const [scoutingData, setScoutingData] = useFirebaseStorage('pc_scouting', {});
            const [scoutingHistory, setScoutingHistory] = useFirebaseStorage('pc_scouting_history', []);
            const [matchData, setMatchData] = useFirebaseStorage('pc_match_report', {});
            const [matchHistory, setMatchHistory] = useFirebaseStorage('pc_match_history', []);
            const [sessionDate, setSessionDate] = useState(new Date().toISOString().split('T')[0]);
            const [sessionDrills, setSessionDrills] = useState([]);
            const [libraryDrills, setLibraryDrills] = useFirebaseStorage('pc_library', []);
            const [microData, setMicroData] = useFirebaseStorage('pc_micro_v7', {});
            const [calendarData, setCalendarData] = useFirebaseStorage('pc_calendar_v7', {});
            const [showSettings, setShowSettings] = useState(false);
            const [boardWeekDate, setBoardWeekDate] = useState(new Date()); 
            const [boardHistory, setBoardHistory] = useFirebaseStorage('pc_board_history_final', {}); 
            const [notices, setNotices] = useFirebaseStorage('pc_notices_list', []);
            const [seasonStats, setSeasonStats] = useFirebaseStorage('pc_season_stats_v2', { league: { p:0, w:0, d:0, l:0, gf:0, ga:0 }, cup: { p:0, w:0, d:0, l:0, gf:0, ga:0 }, friendly: { p:0, w:0, d:0, l:0, gf:0, ga:0 } }); 
            const [showStatsModal, setShowStatsModal] = useState(false);
            const [showAlertsModal, setShowAlertsModal] = useState(false);
            const [isDarkMode, setIsDarkMode] = useFirebaseStorage('pc_dark_mode', false);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark-theme');
                else document.documentElement.classList.remove('dark-theme');
            }, [isDarkMode]);

            const performanceAlerts = useMemo(() => {
                if (!sessionHistory || !players) return [];
                const sortedDates = Object.keys(sessionHistory).sort((a,b) => new Date(b) - new Date(a));
                const recentDates = sortedDates.slice(0, 3);
                const newAlerts = [];
                players.forEach((p, idx) => {
                    if(p.injured) return;
                    let recentRatings = [];
                    let missed = 0;
                    recentDates.forEach(date => {
                        const session = sessionHistory[date];
                        if (session && session.ratings && session.ratings[idx] !== undefined) recentRatings.push(session.ratings[idx]);
                        else missed++;
                    });
                    if (missed >= 2 && recentDates.length >= 2) newAlerts.push({ type: 'absence', player: p.name, msg: `Sem nota em ${missed} das últimas ${recentDates.length} sessões.` });
                    if (recentRatings.length > 0) {
                        const avg = recentRatings.reduce((a,b)=>a+b,0) / recentRatings.length;
                        if (avg < 3.0) newAlerts.push({ type: 'performance', player: p.name, msg: `Média de ${avg.toFixed(1)} nas últimas sessões (Baixa).` });
                    }
                });
                return newAlerts;
            }, [players, sessionHistory]);

            return (
                <div className="flex flex-col h-full bg-slate-100 relative pt-6">
                    <div className="absolute top-0 w-full z-50"><NetworkStatus /></div>
                    <SettingsModal show={showSettings} onClose={()=>setShowSettings(false)} themeColor={themeColor} setThemeColor={setThemeColor} teamLogo={teamLogo} setTeamLogo={setTeamLogo} teamName={teamName} setTeamName={setTeamName} isDarkMode={isDarkMode} setIsDarkMode={setIsDarkMode} />
                    <SeasonStatsModal show={showStatsModal} onClose={()=>setShowStatsModal(false)} stats={seasonStats} setStats={setSeasonStats} themeColor={themeColor} />
                    <AlertsModal show={showAlertsModal} onClose={()=>setShowAlertsModal(false)} alerts={performanceAlerts} themeColor={themeColor} />
                    
                    <div className="bg-white border-b p-2 px-4 flex justify-between items-center shadow-sm z-30 shrink-0">
                        <div className="flex items-center gap-4">
                            {teamLogo && <img src={teamLogo} className="w-10 h-10 object-contain" />}
                            <div className="font-black text-xl italic text-slate-800"><span style={{color: themeColor}}>{teamName}</span> <span className="text-[9px] not-italic bg-purple-600 text-white px-1.5 py-0.5 rounded ml-1 font-bold">CLOUD</span></div>
                        </div>
                        <div className="flex gap-2 items-center"> 
                            <div className="relative">
                                <button type="button" onClick={()=>setShowAlertsModal(true)} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print transition" title="Radar de Desempenho"><Icon name="bell" size={20}/>{performanceAlerts.length > 0 && <span className="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border border-white rounded-full animate-pulse"></span>}</button>
                            </div>
                            <button type="button" onClick={()=>setIsDarkMode(!isDarkMode)} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print transition" title="Alternar Modo Escuro">{isDarkMode ? <Icon name="sun" size={20}/> : <Icon name="moon" size={20}/>}</button>
                            <button type="button" onClick={()=>window.print()} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print transition" title="Imprimir Rápido"><Icon name="printer" size={20}/></button> 
                            <button type="button" onClick={()=>setShowSettings(true)} className="p-2 rounded hover:bg-slate-100 text-slate-400 no-print transition" title="Configurações"><Icon name="settings" size={20}/></button> 
                        </div>
                    </div>

                    <div className="flex bg-slate-100 p-1 rounded-lg gap-1 overflow-x-auto shadow-inner no-print shrink-0">
                        <button type="button" onClick={()=>setTab('dashboard')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='dashboard'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='dashboard'?{backgroundColor: themeColor}:{}}><Icon name="home"/> INÍCIO</button>
                        <button type="button" onClick={()=>setTab('squad')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='squad'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='squad'?{backgroundColor: themeColor}:{}}><Icon name="users"/> PLANTEL</button>
                        <button type="button" onClick={()=>setTab('lineup')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='lineup'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='lineup'?{backgroundColor: themeColor}:{}}><Icon name="shirt"/> ESCALAÇÃO</button>
                        <button type="button" onClick={()=>setTab('performance')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='performance'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='performance'?{backgroundColor: themeColor}:{}}><Icon name="chart"/> PERFORMANCE</button>
                        <button type="button" onClick={()=>setTab('scouting')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='scouting'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='scouting'?{backgroundColor: themeColor}:{}}><Icon name="eye"/> SCOUTING</button>
                        <button type="button" onClick={()=>setTab('session')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='session'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='session'?{backgroundColor: themeColor}:{}}><Icon name="list"/> SESSÃO</button>
                        <button type="button" onClick={()=>setTab('postmatch')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='postmatch'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='postmatch'?{backgroundColor: themeColor}:{}}><Icon name="whistle"/> PÓS-JOGO</button>
                        <button type="button" onClick={()=>setTab('micro')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='micro'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='micro'?{backgroundColor: themeColor}:{}}><Icon name="grid"/> MICRO</button>
                        <button type="button" onClick={()=>setTab('board')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='board'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='board'?{backgroundColor: themeColor}:{}}><Icon name="image"/> BOARD</button> 
                        <button type="button" onClick={()=>setTab('library')} className={`flex-1 px-3 py-2 rounded text-xs font-bold transition-all shrink-0 ${tab==='library'?'text-white shadow':'text-slate-400 hover:text-slate-600'}`} style={tab==='library'?{backgroundColor: themeColor}:{}}><Icon name="book"/> BIBLIOTECA</button>
                    </div>

                    <div className="flex-1 overflow-hidden relative">
                        {tab === 'dashboard' && <DashboardView themeColor={themeColor} players={players} matchHistory={matchHistory} setTab={setTab} teamLogo={teamLogo} scoutingData={scoutingData} microData={microData} calendarData={calendarData} header={header} seasonStats={seasonStats} openStats={()=>setShowStatsModal(true)} notices={notices} setNotices={setNotices} />}
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} history={sessionHistory} />}
                        {tab === 'lineup' && <SmartLineupView players={players} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'performance' && <PerformanceView players={players} history={sessionHistory} themeColor={themeColor} />}
                        {tab === 'scouting' && <ScoutingView themeColor={themeColor} scoutingData={scoutingData} setScoutingData={setScoutingData} scoutingHistory={scoutingHistory} setScoutingHistory={setScoutingHistory} />}
                        {tab === 'session' && <SessionView drills={sessionDrills} setDrills={setSessionDrills} header={header} setHeader={setHeader} logo={teamLogo} themeColor={themeColor} players={players} history={sessionHistory} setHistory={setSessionHistory} sessionDate={sessionDate} setSessionDate={setSessionDate} teamName={teamName} libraryDrills={libraryDrills} />}
                        {tab === 'postmatch' && <PostMatchView themeColor={themeColor} matchData={matchData} setMatchData={setMatchData} players={players} setPlayers={setPlayers} matchHistory={matchHistory} setMatchHistory={setMatchHistory} teamLogo={teamLogo} />}
                        {tab === 'micro' && <MicrocycleView micro={microData} setMicro={setMicroData} themeColor={themeColor} calendar={calendarData} />}
                        {tab === 'board' && <VisualBoardView currentWeekStart={getMonday(boardWeekDate)} changeWeek={(d)=>{const n=new Date(boardWeekDate); n.setDate(n.getDate()+d); setBoardWeekDate(n);}} boardData={boardHistory[`${boardWeekDate.getFullYear()}-W${Math.ceil((((boardWeekDate - new Date(boardWeekDate.getFullYear(), 0, 1)) / 86400000) + 1) / 7)}`] || {}} updateBoardData={(day, images, mdTag)=>{const key=`${boardWeekDate.getFullYear()}-W${Math.ceil((((boardWeekDate - new Date(boardWeekDate.getFullYear(), 0, 1)) / 86400000) + 1) / 7)}`; setBoardHistory({...boardHistory, [key]: {...(boardHistory[key]||{}), [day]: {images, mdTag}}});}} themeColor={themeColor} />}
                        {tab === 'library' && <LibraryView libraryDrills={libraryDrills} setLibraryDrills={setLibraryDrills} onAddToSession={(item)=>{setSessionDrills([...sessionDrills, {...item, id:Date.now()}]); alert("Enviado para a Sessão Atual!");}} onAddToBoard={()=>{}} themeColor={themeColor} />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
